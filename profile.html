<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST MODE | allergyZEN</title>
    <style>
        :root { --primary: #8e44ad; --red: #e74c3c; --orange: #f39c12; --green: #27ae60; --light: #f4f9f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff5f5; padding: 15px; color: #333; }
        .header { text-align: center; padding: 20px; background: white; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--red); }
        .item-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .status-group { display: flex; gap: 8px; }
        .btn-status { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; opacity: 0.2; }
        .btn-red { background: var(--red); }
        .btn-green { background: var(--green); }
        .btn-status.active { opacity: 1; border-color: #333; }
        .qr-btn { background: var(--red); color: white; width: 100%; border: none; border-radius: 12px; padding: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="color: var(--red); margin:0;">TEST MODE: 5-SEC EXPIRY</h2>
    <p style="font-size: 0.8rem;">QR will die 5 seconds after you click generate.</p>
</div>

<div id="list-container">
    <div class="item-card">
        <span class="item-name">Test Item (Dairy)</span>
        <div class="status-group">
            <button class="btn-status btn-red" onclick="setStatus(this, 'Test Item')"></button>
            <button class="btn-status btn-green" onclick="setStatus(this, 'Test Item')"></button>
        </div>
    </div>
</div>

<div id="qrcode-container" style="display: none; text-align: center; margin-top:20px;">
    <div id="qrcode"></div>
</div>

<button onclick="generateQR()" class="qr-btn">Generate "Short-Lived" QR</button>

<script>
    const secureStorage = {
        save: (data) => {
            const encrypted = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            localStorage.setItem('allergyZEN_vault', encrypted);
        },
        load: () => {
            const data = localStorage.getItem('allergyZEN_vault');
            try { return data ? JSON.parse(decodeURIComponent(escape(atob(data)))) : []; }
            catch(e) { return []; }
        }
    };

    let userProfile = secureStorage.load();

    function setStatus(btn, itemName) {
        let group = btn.parentElement.querySelectorAll('.btn-status');
        group.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        let level = btn.classList.contains('btn-red') ? "High" : "Safe";
        userProfile = [{ name: itemName, level: level }];
        secureStorage.save(userProfile);
    }

    function generateQR() {
        const profileData = secureStorage.load();
        const handshake = {
            id: "TEST-ID",
            expires: Date.now() + 5000, // <--- THE TEST: 5 SECONDS ONLY
            payload: profileData.map(i => ({n: i.name, l: i.level}))
        };
        const encodedData = btoa(unescape(encodeURIComponent(JSON.stringify(handshake))));
        const shareUrl = `https://allergyzen.app/view.html?token=${encodedData}`;
        const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(shareUrl)}`;
        document.getElementById('qrcode').innerHTML = `<img src="${qrImgUrl}" style="width:200px;">`;
        document.getElementById('qrcode-container').style.display = 'block';
    }
</script>
</body>
</html>
