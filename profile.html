<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wellness Profile | allergyZEN</title>
    <style>
        :root { --primary: #8e44ad; --red: #e74c3c; --orange: #f39c12; --green: #27ae60; --light: #f4f9f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); padding: 15px; color: #333; }
        .header { text-align: center; padding: 20px; background: white; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .search-section { margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--primary); font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        .tip-box { background: #e8daef; padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 0.85rem; color: #5b2c6f; border: 1px dashed var(--primary); }
        .item-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); gap: 10px; }
        .item-name { font-weight: bold; flex-grow: 1; font-size: 0.9rem; line-height: 1.2; }
        .status-group { display: flex; gap: 8px; }
        .btn-status { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; opacity: 0.2; transition: 0.2s; padding: 0; }
        .btn-red { background: var(--red); }
        .btn-orange { background: var(--orange); }
        .btn-green { background: var(--green); }
        .btn-status.active { opacity: 1; border-color: #333; transform: scale(1.1); }
        .category-label { font-size: 0.75rem; color: var(--primary); font-weight: bold; margin: 20px 0 8px 5px; text-transform: uppercase; }
        .back-link { display: block; text-align: center; margin-top: 30px; color: var(--primary); text-decoration: none; font-weight: bold; padding: 15px; background: white; border-radius: 12px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <h2 style="color: var(--primary); margin:0;">Wellness Profile</h2>
    <p style="font-size: 0.8rem;">Tap a color to set your reaction level</p>
</div>

<div class="search-section">
    <input type="text" id="allergySearch" placeholder="Search 1,750+ items..." onkeyup="smartSearch()">
    <div class="tip-box">
        <strong>Search for:</strong> Cows milk, Cashews, E1202, etc.
    </div>
</div>

<div id="list-container">
    <div class="category-label">Food Essentials</div>
    <div class="item-card" data-name="Dairy & Lactose"><span class="item-name">Dairy & Lactose</span><div class="status-group"><button class="btn-status btn-red" onclick="setStatus(this, 'Dairy & Lactose')"></button><button class="btn-status btn-orange" onclick="setStatus(this, 'Dairy & Lactose')"></button><button class="btn-status btn-green" onclick="setStatus(this, 'Dairy & Lactose')"></button></div></div>
    <div class="item-card" data-name="Gluten & Wheat"><span class="item-name">Gluten & Wheat</span><div class="status-group"><button class="btn-status btn-red" onclick="setStatus(this, 'Gluten & Wheat')"></button><button class="btn-status btn-orange" onclick="setStatus(this, 'Gluten & Wheat')"></button><button class="btn-status btn-green" onclick="setStatus(this, 'Gluten & Wheat')"></button></div></div>
    <div class="item-card" data-name="Peanuts & Tree Nuts"><span class="item-name">Peanuts & Tree Nuts</span><div class="status-group"><button class="btn-status btn-red" onclick="setStatus(this, 'Peanuts & Tree Nuts')"></button><button class="btn-status btn-orange" onclick="setStatus(this, 'Peanuts & Tree Nuts')"></button><button class="btn-status btn-green" onclick="setStatus(this, 'Peanuts & Tree Nuts')"></button></div></div>
    <div class="item-card" data-name="Shellfish"><span class="item-name">Shellfish</span><div class="status-group"><button class="btn-status btn-red" onclick="setStatus(this, 'Shellfish')"></button><button class="btn-status btn-orange" onclick="setStatus(this, 'Shellfish')"></button><button class="btn-status btn-green" onclick="setStatus(this, 'Shellfish')"></button></div></div>

    <div class="category-label">Medications & Metals</div>
    <div class="item-card" data-name="NSAIDs (Aspirin/Ibuprofen)"><span class="item-name">NSAIDs (Aspirin/Ibuprofen)</span><div class="status-group"><button class="btn-status btn-red" onclick="setStatus(this, 'NSAIDs (Aspirin/Ibuprofen)')"></button><button class="btn-status btn-orange" onclick="setStatus(this, 'NSAIDs (Aspirin/Ibuprofen)')"></button><button class="btn-status btn-green" onclick="setStatus(this, 'NSAIDs (Aspirin/Ibuprofen)')"></button></div></div>
    <div class="item-card" data-name="Paracetamol"><span class="item-name">Paracetamol</span><div class="status-group"><button class="btn-status btn-red" onclick="setStatus(this, 'Paracetamol')"></button><button class="btn-status btn-orange" onclick="setStatus(this, 'Paracetamol')"></button><button class="btn-status btn-green" onclick="setStatus(this, 'Paracetamol')"></button></div></div>
    <div class="item-card" data-name="Nickel"><span class="item-name">Nickel</span><div class="status-group"><button class="btn-status btn-red" onclick="setStatus(this, 'Nickel')"></button><button class="btn-status btn-orange" onclick="setStatus(this, 'Nickel')"></button><button class="btn-status btn-green" onclick="setStatus(this, 'Nickel')"></button></div></div>
    <div class="item-card" data-name="Aluminum"><span class="item-name">Aluminum</span><div class="status-group"><button class="btn-status btn-red" onclick="setStatus(this, 'Aluminum')"></button><button class="btn-status btn-orange" onclick="setStatus(this, 'Aluminum')"></button><button class="btn-status btn-green" onclick="setStatus(this, 'Aluminum')"></button></div></div>
</div>

<div id="search-results"></div>

<a href="index.html" class="back-link">← Save & Exit</a>

<script>
    let allergenDatabase = [];
    let userProfile = JSON.parse(localStorage.getItem('myAllergies')) || [];

    // 1. Fetch the JSON database
    fetch('allergens.json?v=' + Date.now())
        .then(r => r.json())
        .then(data => { 
            allergenDatabase = data; 
            console.log("Database loaded: " + allergenDatabase.length + " items");
            applySavedStatus(); // Highlight items already saved
        })
        .catch(err => console.error("Error loading allergens:", err));

    // 2. Set Status AND Save to Memory
    function setStatus(btn, itemName) {
        let group = btn.parentElement.querySelectorAll('.btn-status');
        group.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        let level = "Safe";
        if (btn.classList.contains('btn-red')) level = "High";
        if (btn.classList.contains('btn-orange')) level = "Moderate";

        // Update logic
        userProfile = userProfile.filter(i => i.name !== itemName);
        userProfile.push({
            name: itemName,
            level: level,
            date: new Date().toLocaleDateString()
        });

        localStorage.setItem('myAllergies', JSON.stringify(userProfile));
    }

    // 3. Search Logic
    function smartSearch() {
        const input = document.getElementById('allergySearch').value.toLowerCase().trim();
        const resultsContainer = document.getElementById('search-results');
        const quickList = document.getElementById('list-container');
        
        if (input.length < 1) {
            resultsContainer.innerHTML = "";
            quickList.style.display = "block";
            applySavedStatus(); 
            return;
        }

        quickList.style.display = "none";
        const matches = allergenDatabase.filter(item => 
            item.name.toLowerCase().includes(input) || 
            item.category.toLowerCase().includes(input)
        );

        if(matches.length === 0) {
            resultsContainer.innerHTML = '<p style="text-align:center; padding:20px; color:gray;">No items found.</p>';
            return;
        }

        resultsContainer.innerHTML = matches.slice(0, 20).map(match => {
            const saved = userProfile.find(p => p.name === match.name);
            return `
            <div class="item-card">
                <span class="item-name">
                    ${match.name} <br>
                    <small style="color:var(--primary); font-weight:normal;">${match.category}</small>
                </span>
                <div class="status-group">
                    <button class="btn-status btn-red ${saved?.level === 'High' ? 'active' : ''}" onclick="setStatus(this, '${match.name.replace(/'/g, "\\'")}')"></button>
                    <button class="btn-status btn-orange ${saved?.level === 'Moderate' ? 'active' : ''}" onclick="setStatus(this, '${match.name.replace(/'/g, "\\'")}')"></button>
                    <button class="btn-status btn-green ${saved?.level === 'Safe' ? 'active' : ''}" onclick="setStatus(this, '${match.name.replace(/'/g, "\\'")}')"></button>
                </div>
            </div>`;
        }).join('');
    }

    // 4. Highlight circles for existing saves
    function applySavedStatus() {
        const items = document.querySelectorAll('.item-card');
        items.forEach(card => {
            const name = card.getAttribute('data-name');
            if(!name) return;
            const saved = userProfile.find(p => p.name === name);
            if (saved) {
                const buttons = card.querySelectorAll('.btn-status');
                buttons.forEach(btn => {
                    if (saved.level === "High" && btn.classList.contains('btn-red')) btn.classList.add('active');
                    if (saved.level === "Moderate" && btn.classList.contains('btn-orange')) btn.classList.add('active');
                    if (saved.level === "Safe" && btn.classList.contains('btn-green')) btn.classList.add('active');
                });
            }
        });
    }
<div id="qrcode-container" style="display: none; text-align: center; background: white; padding: 20px; border-radius: 15px; margin: 20px 0;">
    <p style="font-size:0.85rem; color: var(--primary); font-weight: bold; margin-bottom: 10px;">Show this to staff to scan:</p>
    <div id="qrcode"></div>
</div>

<button onclick="generateQR()" style="background: var(--primary); color: white; width: 100%; border: none; border-radius: 12px; padding: 15px; font-weight: bold; cursor: pointer; margin-bottom: 10px;">Generate My Safety QR</button>

                });
            }
        });
    }

    // 5. NEW: QR GENERATION LOGIC
    function generateQR() {
        const profileData = localStorage.getItem('myAllergies');
        if (!profileData || profileData === '[]') {
            alert("Please add some items to your profile first!");
            return;
        }

        // Show the QR container (ensure you added the HTML div I mentioned previously)
        const container = document.getElementById('qrcode-container');
        if(container) container.style.display = 'block';

        // Encode the library
        const encodedData = btoa(unescape(encodeURIComponent(profileData))); 
        
        // Point to your live domain view page
        const shareUrl = `https://allergyzen.app/view.html?data=${encodedData}`;
        
        // Generate QR Image
        const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(shareUrl)}`;
        
        const qrDiv = document.getElementById('qrcode');
        if(qrDiv) {
            qrDiv.innerHTML = `<img src="${qrImgUrl}" alt="Safety QR" style="border: 5px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 200px;">`;
            qrDiv.scrollIntoView({ behavior: 'smooth' });
        }
    }
</script>
</body>
</html>
