<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My allerZEN Profile</title>
    <style>
        :root { --primary: #8e44ad; --bg: #fdfbff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .logo-small { width: 80px; }
        .category { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .category-title { font-weight: bold; color: var(--primary); display: flex; justify-content: space-between; cursor: pointer; }
        .allergen-list { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .allergen-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 0.9rem; }
        input[type="checkbox"] { margin-right: 15px; accent-color: var(--primary); width: 20px; height: 20px; }
        .save-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; position: sticky; bottom: 20px; }
        .pro-badge { background: #ffd700; color: #000; font-size: 0.7rem; padding: 2px 6px; border-radius: 5px; margin-left: 10px; }
    </style>
</head>
<body>

<div class="header">
    <img src="logo.png" alt="allerZEN" class="logo-small">
    <h2>My Safety Profile</h2>
    <p>Select your triggers to activate your shield.</p>
</div>

<div class="category">
    <div class="category-title" onclick="toggleCat('meds')">💊 Medicinal Excipients <span class="pro-badge">ProZEN</span> <span>▼</span></div>
    <div id="meds" class="allergen-list">
        <div class="allergen-item"><input type="checkbox"> Croscarmellose Sodium</div>
        <div class="allergen-item"><input type="checkbox"> Magnesium Stearate</div>
        <div class="allergen-item"><input type="checkbox"> Lactose Monohydrate</div>
    </div>
</div>

<div class="category">
    <div class="category-title" onclick="toggleCat('fibers')">🧤 Luxury Fibers <span class="pro-badge">ProZEN</span> <span>▼</span></div>
    <div id="fibers" class="allergen-list">
        <div class="allergen-item"><input type="checkbox"> Vicuna</div>
        <div class="allergen-item"><input type="checkbox"> Qiviut</div>
        <div class="allergen-item"><input type="checkbox"> Cashmere</div>
    </div>
</div>

<div class="category">
    <div class="category-title" onclick="toggleCat('ferment')">🥗 Fermented Basics <span>▼</span></div>
    <div id="ferment" class="allergen-list">
        <div class="allergen-item"><input type="checkbox"> Kimchi (Bacteria Triggers)</div>
        <div class="allergen-item"><input type="checkbox"> Natto</div>
        <div class="allergen-item"><input type="checkbox"> Kombucha</div>
    </div>
</div>

<button class="save-btn" onclick="saveProfile()">SAVE MY SHIELD</button>

<script>
    function toggleCat(id) {
        const list = document.getElementById(id);
        list.style.display = list.style.display === 'block' ? 'none' : 'block';
    }

    function saveProfile() {
        alert("Profile Saved! Your 3-hour Safety Shield is now active.");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
