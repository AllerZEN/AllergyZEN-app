<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wellness Profile | allergyZEN</title>
    <style>
        :root { --primary: #8e44ad; --red: #e74c3c; --orange: #f39c12; --green: #27ae60; --light: #f4f9f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); padding: 15px; color: #333; }
        .header { text-align: center; padding: 20px; background: white; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .search-section { margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--primary); font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        .tip-box { background: #e8daef; padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 0.85rem; color: #5b2c6f; border: 1px dashed var(--primary); }
        .item-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); gap: 10px; }
        .item-name { font-weight: bold; flex-grow: 1; font-size: 0.9rem; line-height: 1.2; }
        .status-group { display: flex; gap: 8px; }
        .btn-status { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; opacity: 0.2; transition: 0.2s; padding: 0; }
        .btn-red { background: var(--red); }
        .btn-orange { background: var(--orange); }
        .btn-green { background: var(--green); }
        .btn-status.active { opacity: 1; border-color: #333; transform: scale(1.1); }
        .category-label { font-size: 0.75rem; color: var(--primary); font-weight: bold; margin: 20px 0 8px 5px; text-transform: uppercase; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--primary); text-decoration: none; font-weight: bold; padding: 15px; background: white; border-radius: 12px; border: 1px solid var(--primary); }
        .qr-btn { background: var(--primary); color: white; width: 100%; border: none; border-radius: 12px; padding: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="color: var(--primary); margin:0;">Wellness Profile</h2>
    <p style="font-size: 0.8rem;">Tap a color to set your reaction level</p>
</div>

<div class="search-section">
    <input type="text" id="allergySearch" placeholder="Search 1,750+ items..." onkeyup="smartSearch()">
    <div class="tip-box">
        <strong>Try searching:</strong> Terpenes, Wenge, or Croscarmellose.
    </div>
</div>

<div id="search-results"></div>

<div id="list-container">
    <div class="category-label">Quick Access Essentials</div>
    </div>

<div id="qrcode-container" style="display: none; text-align: center; background: white; padding: 20px; border-radius: 15px; margin: 20px 0; border: 2px solid var(--primary);">
    <p style="font-size:0.85rem; color: var(--primary); font-weight: bold; margin-bottom: 10px;">Security: This QR is active for 3 hours.</p>
    <div id="qrcode"></div>
</div>

<button onclick="generateQR()" class="qr-btn">Generate Safety QR (3-Hour Window)</button>

<a href="index.html" class="back-link">← Save & Exit</a>

<script>
    let allergenDatabase = [];
    
    // 1. Security: Encryption Wrapper for Local Storage
    const secureStorage = {
        save: (data) => {
            const encrypted = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            localStorage.setItem('allergyZEN_vault', encrypted);
        },
        load: () => {
            const data = localStorage.getItem('allergyZEN_vault');
            try { 
                return data ? JSON.parse(decodeURIComponent(escape(atob(data)))) : []; 
            } catch(e) { 
                return []; 
            }
        }
    };

    let userProfile = secureStorage.load();

    // 2. Load Database & Render
    fetch('allergens.json?v=' + Date.now())
        .then(r => r.json())
        .then(data => { 
            allergenDatabase = data; 
            renderQuickList();
        })
        .catch(err => console.error("Error loading allergens:", err));

    function setStatus(btn, itemName) {
        let group = btn.parentElement.querySelectorAll('.btn-status');
        group.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        let level = "Safe";
        if (btn.classList.contains('btn-red')) level = "High";
        if (btn.classList.contains('btn-orange')) level = "Moderate";

        userProfile = userProfile.filter(i => i.name !== itemName);
        userProfile.push({ 
            name: itemName, 
            level: level, 
            date: new Date().toISOString() 
        });
        secureStorage.save(userProfile);
    }

    function smartSearch() {
        const input = document.getElementById('allergySearch').value.toLowerCase().trim();
        const resultsContainer = document.getElementById('search-results');
        const quickList = document.getElementById('list-container');
        
        if (input.length < 1) {
            resultsContainer.innerHTML = "";
            quickList.style.display = "block";
            return;
        }

        quickList.style.display = "none";
        const matches = allergenDatabase.filter(item => 
            item.name.toLowerCase().includes(input) || 
            item.category.toLowerCase().includes(input)
        );

        resultsContainer.innerHTML = matches.slice(0, 25).map(match => {
            const saved = userProfile.find(p => p.name === match.name);
            return `
            <div class="item-card">
                <span class="item-name">
                    ${match.name}<br>
                    <small style="color:var(--primary);">${match.category}</small>
                </span>
                <div class="status-group">
                    <button class="btn-status btn-red ${saved?.level === 'High' ? 'active' : ''}" onclick="setStatus(this, '${match.name.replace(/'/g, "\\'")}')"></button>
                    <button class="btn-status btn-orange ${saved?.level === 'Moderate' ? 'active' : ''}" onclick="setStatus(this, '${match.name.replace(/'/g, "\\'")}')"></button>
                    <button class="btn-status btn-green ${saved?.level === 'Safe' ? 'active' : ''}" onclick="setStatus(this, '${match.name.replace(/'/g, "\\'")}')"></button>
                </div>
            </div>`;
        }).join('');
    }

    function renderQuickList() {
        const container = document.getElementById('list-container');
        const essentials = ["Dairy & Lactose", "Gluten & Wheat", "Nickel"];
        container.innerHTML = '<div class="category-label">Quick Access Essentials</div>' + essentials.map(name => {
            const saved = userProfile.find(p => p.name === name);
            return `
            <div class="item-card" data-name="${name}">
                <span class="item-name">${name}</span>
                <div class="status-group">
                    <button class="btn-status btn-red ${saved?.level === 'High' ? 'active' : ''}" onclick="setStatus(this, '${name}')"></button>
                    <button class="btn-status btn-orange ${saved?.level === 'Moderate' ? 'active' : ''}" onclick="setStatus(this, '${name}')"></button>
                    <button class="btn-status btn-green ${saved?.level === 'Safe' ? 'active' : ''}" onclick="setStatus(this, '${name}')"></button>
                </div>
            </div>`;
        }).join('');
    }

    // 3. Secure 3-Hour Masked QR Generation
    function generateQR() {
        const profileData = secureStorage.load();
        if (profileData.length === 0) { 
            alert("Please add some items to your profile first!"); 
            return; 
        }

        // Masking the data and setting expiration
        const handshake = {
            id: "AZ-" + Math.random().toString(36).substr(2, 9),
            expires: Date.now() + (3 * 60 * 60 * 1000), // 3 Hour protection
            payload: profileData.map(i => ({n: i.name, l: i.level})) // Masked for scan speed
        };

        const encodedData = btoa(unescape(encodeURIComponent(JSON.stringify(handshake))));
        const shareUrl = `https://allergyzen.app/view.html?token=${encodedData}`;
        
        const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(shareUrl)}`;
        
        document.getElementById('qrcode').innerHTML = `<img src="${qrImgUrl}" style="width:200px; border:5px solid white;">`;
        document.getElementById('qrcode-container').style.display = 'block';
        document.getElementById('qrcode-container').scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
