<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Access | allergyZEN</title>
    <style>
        :root { --primary: #8e44ad; --secondary: #27ae60; --red: #e74c3c; --orange: #f39c12; --green: #27ae60; --light: #f4f9f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); padding: 15px; margin: 0; }
        .header { background: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--primary); margin-bottom: 20px; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        
        /* PIN Gate Styling */
        #pinGate { text-align: center; }
        input[type="password"] { width: 80%; padding: 15px; font-size: 1.5rem; text-align: center; border-radius: 12px; border: 2px solid var(--primary); margin-bottom: 15px; letter-spacing: 10px; }
        .btn-unlock { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* Data Display */
        #secureContent { display: none; }
        .status-badge { padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .active { background: #d4efdf; color: #1e8449; border: 1px solid var(--green); }
        .expired { background: #fdeaea; color: #c0392b; border: 1px solid var(--red); }
        .risk-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .badge { padding: 5px 12px; border-radius: 50px; color: white; font-size: 0.75rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; color: var(--primary);">allergyZEN <span style="color: var(--secondary);">Partner Portal</span></h2>
</div>

<div class="card">
    <div id="pinGate">
        <h3 style="margin-top:0;">Business Access Required</h3>
        <p style="font-size: 0.85rem; color: #666;">Enter your 4-digit Partner PIN to view this safety profile.</p>
        <input type="password" id="pinInput" maxlength="4" placeholder="••••">
        <button class="btn-unlock" onclick="verifyPin()">Verify & Unlock</button>
        <p id="pinError" style="color: var(--red); font-size: 0.8rem; margin-top: 10px; display: none;">Invalid Partner PIN</p>
    </div>

    <div id="secureContent">
        <div id="securityStatus"></div>
        <div id="riskList"></div>
        <div class="action-area" style="margin-top: 20px; border-top: 2px dashed #eee; padding-top: 20px;">
            <button class="btn-unlock" style="background: var(--secondary);" onclick="requestTrust()">Request to Save Profile</button>
        </div>
    </div>
</div>

<script>
    // Set your master PIN here (for testing, let's use 2026)
    const MASTER_PIN = "2026"; 

    function verifyPin() {
        const input = document.getElementById('pinInput').value;
        const gate = document.getElementById('pinGate');
        const content = document.getElementById('secureContent');
        const error = document.getElementById('pinError');

        if (input === MASTER_PIN) {
            gate.style.display = 'none';
            content.style.display = 'block';
            processQRData();
        } else {
            error.style.display = 'block';
            document.getElementById('pinInput').value = '';
        }
    }

    function processQRData() {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const statusDiv = document.getElementById('securityStatus');
        const riskList = document.getElementById('riskList');

        if (!token) return;

        try {
            const handshake = JSON.parse(decodeURIComponent(escape(atob(token))));
            const now = Date.now();

            // 3-HOUR SECURITY CHECK
            if (handshake.expires && now > handshake.expires) {
                statusDiv.className = "status-badge expired";
                statusDiv.innerHTML = "⚠️ SESSION EXPIRED<br><small>Safety window closed.</small>";
            } else {
                statusDiv.className = "status-badge active";
                statusDiv.innerHTML = "✅ ACTIVE PROTECTION";
                
                const profile = handshake.payload || [];
                riskList.innerHTML = "";
                profile.forEach(item => {
                    let color = item.l === 'High' ? 'var(--red)' : (item.l === 'Moderate' ? 'var(--orange)' : 'var(--green)');
                    riskList.innerHTML += `
                        <div class="risk-row">
                            <strong>${item.n}</strong>
                            <span class="badge" style="background:${color}">${item.l}</span>
                        </div>`;
                });
            }
        } catch (e) {
            statusDiv.innerHTML = "❌ DECRYPTION ERROR";
        }
    }

    function requestTrust() {
        const testBusiness = { id: "BIZ-101", name: "Verified Partner #101" };
        let trusted = JSON.parse(localStorage.getItem('az_trusted_partners') || '[]');
        if (!trusted.find(b => b.id === testBusiness.id)) {
            trusted.push(testBusiness);
            localStorage.setItem('az_trusted_partners', JSON.stringify(trusted));
            alert("Partner Verified! Profile added to customer's Trusted list.");
        } else {
            alert("Partner is already trusted.");
        }
    }
</script>
</body>
</html>
