<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner | allergyZEN</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #8e44ad; --light: #f4f9f4; }
        body { font-family: sans-serif; margin: 0; background: #000; color: white; text-align: center; }
        #reader { width: 100%; max-width: 500px; margin: auto; }
        .controls { padding: 20px; background: var(--primary); }
        .result-box { padding: 20px; background: white; color: black; margin: 20px; border-radius: 10px; display: none; }
        .back-btn { color: white; text-decoration: none; display: block; padding: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="controls">
    <h2>allergyZEN Scanner</h2>
    <p>Point your camera at a menu QR code</p>
</div>

<div id="reader"></div>

<div id="scanned-result" class="result-box">
    <h3>Item Detected</h3>
    <p id="result-text"></p>
    <button onclick="location.reload()" style="padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px;">Scan Again</button>
</div>

<a href="index.html" class="back-btn">← Back to Home</a>

<script>
    function onScanSuccess(decodedText, decodedResult) {
        document.getElementById('scanned-result').style.display = 'block';
        document.getElementById('result-text').innerText = "Result: " + decodedText;
        html5QrcodeScanner.clear();
    }
    let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
