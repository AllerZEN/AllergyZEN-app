<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>allergyZEN Wellness Assistant App - Launchpad</title>
    <style>
        :root {
            --zen-blue: #673AB7;
            --zen-dark: #0a0a0a;
            --zen-card: #161616;
            --danger: #ff4444;    /* 🔴 */
            --warning: #8B4513;   /* 🟤 Updated from Yellow */
            --safe: #00c851;      /* 🟢 */
            --text-main: #e0e0e0;
            --text-dim: #888;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            background-color: var(--zen-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .launchpad-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
        }

        .main-card {
            background: var(--zen-card);
            border-radius: 28px;
            padding: 40px 20px;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        /* The 3-Hour Handshake Visualizer */
        .status-ring {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            border: 4px solid #333;
            background: rgba(255,255,255,0.02);
        }

        .status-ring.active { border-color: var(--zen-blue); box-shadow: 0 0 20px rgba(0, 123, 255, 0.4); }
        .status-ring.danger { border-color: var(--danger); }
        .status-ring.warning { border-color: var(--warning); }
        .status-ring.safe { border-color: var(--safe); }

        h1 { font-size: 1.8rem; margin: 10px 0; letter-spacing: 1px; }
        .tagline { color: var(--text-dim); margin-bottom: 30px; font-size: 0.9rem; }

        /* Results Logic UI */
        #results-display { margin: 20px 0; padding: 15px; border-radius: 12px; display: none; }
        .result-item { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border-radius: 15px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-primary { background: var(--zen-blue); color: white; }
        .btn-outline { background: transparent; border: 1px solid #444; color: var(--text-main); }
        .btn-safe-tab { background: rgba(0, 200, 81, 0.1); color: var(--safe); border: 1px solid var(--safe); }

        /* Knowledge Hub Section */
        .knowledge-hub {
            margin-top: 30px;
            text-align: left;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            border-left: 4px solid var(--zen-blue);
        }

        .knowledge-hub b { color: var(--zen-blue); display: block; margin-bottom: 5px; }

        /* Handshake Options (30m, 1h, 3h, 24h) Visuals */
        .timer-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .timer-chip { font-size: 0.7rem; padding: 5px; background: #222; border-radius: 5px; color: var(--text-dim); }

        .footer-note { font-size: 0.75rem; color: #555; margin-top: 25px; }
    </style>
</head>
<body>

<div class="launchpad-wrapper">
    <div class="main-card">
        <div id="status-ring" class="status-ring">⚪</div>
        
        <h1 id="brand-name">allergyZEN</h1>
        <p class="tagline">Bulletproof Wellness Assistant</p>

        <div id="results-display">
            </div>

        <div id="main-actions">
            </div>

        <div id="safe-tab-container" style="display: none;">
            <button class="btn btn-safe-tab" onclick="location.href='view.html#safe'">See Safe Alternatives</button>
        </div>

        <div class="knowledge-hub" id="hub-content">
            <b>Zen Knowledge Hub</b>
            <span id="tip-text">Scanning for potential triggers in medicinal excipients...</span>
        </div>

        <div class="footer-note">
            Handshake duration monitored. All data wipes after expiration to ensure zero data leakage.
        </div>
    </div>
</div>

<script>
    /**
     * MASTER APP CONTROLLER
     * Handles: Handshake validation, State switching, and UI mirroring
     */
    const App = {
        state: {
            handshakeActive: false,
            timeRemaining: 0,
            handshakeOptions: ['30min', '1hr', '3hr', '24hr']
        },

        init: function() {
            this.checkSession();
            this.loadKnowledgeTip();
            this.renderUI();
        },

        checkSession: function() {
            const profile = JSON.parse(localStorage.getItem('allergyZEN_Profile'));
            if (profile && profile.isActive) {
                const now = Date.now();
                const elapsed = (now - profile.startTime) / 60000; // minutes
                
                if (elapsed < profile.handshakeDuration) {
                    this.state.handshakeActive = true;
                    this.state.timeRemaining = Math.round(profile.handshakeDuration - elapsed);
                } else {
                    this.forceWipe();
                }
            }
        },

        renderUI: function() {
            const ring = document.getElementById('status-ring');
            const actions = document.getElementById('main-actions');
            const safeTab = document.getElementById('safe-tab-container');
            const results = document.getElementById('results-display');

            if (this.state.handshakeActive) {
                ring.textContent = "🔵";
                ring.className = "status-ring active";
                actions.innerHTML = `
                    <a href="view.html" class="btn btn-primary">View My Active Shield</a>
                    <div class="timer-options">
                        <div class="timer-chip">30m</div><div class="timer-chip">1h</div>
                        <div class="timer-chip" style="color:var(--zen-blue)">3h</div><div class="timer-chip">24h</div>
                    </div>
                    <button class="btn btn-outline" onclick="App.extendHandshake()">Update Handshake</button>
                `;
                // Show immediate result example (🟢 for safe demo)
                results.style.display = "block";
                results.innerHTML = `<div class="result-item">🟢 Safe for Current Profile</div>`;
                safeTab.style.display = "block";
            } else {
                ring.textContent = "🟤";
                ring.className = "status-ring warning";
                actions.innerHTML = `
                    <a href="profile.html" class="btn btn-primary">Activate Shield</a>
                    <p style="font-size:0.8rem; color:#888;">No active handshake found.</p>
                `;
            }
        },

        loadKnowledgeTip: function() {
            const tips = [
                "Medicinal Excipients: Fillers like Croscarmellose Sodium are hidden triggers.",
                "Modern Materials: PLA and Mushroom Leather are common in 'sustainable' gear.",
                "Terpene Profile: Pinene and Myrcene can explain botanical sensitivities.",
                "Luxury Fibers: Vicuna and Qiviut are distinct from sheep wool.",
                "Fermented Basics: Specific bacteria/fungi in Kimchi can be triggers."
            ];
            document.getElementById('tip-text').textContent = tips[Math.floor(Math.random() * tips.length)];
        },

        forceWipe: function() {
            console.log("Handshake Expired. Mirroring wipe across system.");
            localStorage.removeItem('allergyZEN_active_session');
            const profile = JSON.parse(localStorage.getItem('allergyZEN_Profile'));
            if(profile) {
                profile.isActive = false;
                localStorage.setItem('allergyZEN_Profile', JSON.stringify(profile));
            }
            this.state.handshakeActive = false;
            this.renderUI();
        },

        extendHandshake: function() {
            window.location.href = 'profile.html';
        }
    };

    // UPGRADE HOOK: [INSERT_V0_MIRROR_VALIDATION]
    // Ensures GitHub Pages or Vercel production matches this local master state.
    
    document.addEventListener('DOMContentLoaded', () => App.init());
</script>

</body>
</html>
