<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>allergyZEN Wellness Assistant</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { 
            --primary: #3B82F6; /* Shield Blue as default */
            --bg: #F9FAFB; 
            --text: #111827; 
            --zen-red: #EF4444; /* 🔴 STOP */
            --zen-amber: #F59E0B; /* 🟠 CAUTION */
            --zen-brown: #78350f; /* 🟤 DISLIKE/REACTION */
            --zen-blue: #3B82F6; /* 💙 BOUNDARY/SENSORY */
            --zen-green: #10B981; /* 🟢 SAFE */
        }
        
        html, body { 
            height: 100%; margin: 0; padding: 0; 
            overflow: hidden; font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text);
        }

        .header { 
            background: white; height: 65px; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px;
            border-bottom: 1px solid #e5e7eb; position: fixed; top: 0; width: 100%; z-index: 999;
        }

        #app-logo { font-weight: 900; font-style: italic; letter-spacing: -1px; font-size: 1.4rem; }

        .content-scroll {
            position: absolute; top: 65px; bottom: 90px; left: 0; right: 0;
            overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch;
        }

        /* QR SCANNER CONTAINER */
        #reader-container {
            width: 100%; background: #000; border-radius: 24px; overflow: hidden;
            margin-bottom: 20px; display: none; position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .top-carousel {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            gap: 12px; padding-bottom: 20px; scrollbar-width: none;
        }
        .top-carousel::-webkit-scrollbar { display: none; }

        .scroll-card {
            flex: 0 0 85%; scroll-snap-align: center;
            background: #111827; color: white; padding: 20px; border-radius: 24px;
        }

        /* 3-HOUR HANDSHAKE PULSE */
        .shield-timer-pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(59, 130, 246, 0.2); color: var(--zen-blue);
            padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 800;
            text-transform: uppercase; border: 1px solid var(--zen-blue);
        }

        .search-container {
            display: flex; align-items: center; background: white;
            border-radius: 18px; padding: 14px 20px; border: 1px solid #eee;
            margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .search-input { flex: 1; border: none; outline: none; font-size: 16px; font-weight: 500; }

        /* ZEN SPECTRUM GRID - 5 TIERS */
        .spectrum-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .spec-btn { 
            height: 45px; border: none; border-radius: 12px; color: white; 
            font-size: 8px; font-weight: 900; display: flex; align-items: center; 
            justify-content: center; text-transform: uppercase;
        }
        .btn-red { background: var(--zen-red); }
        .btn-amber { background: var(--zen-amber); }
        .btn-brown { background: var(--zen-brown); }
        .btn-blue { background: var(--zen-blue); box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
        .btn-green { background: var(--zen-green); }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 95px;
            background: white; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #eee; padding-bottom: 10px;
        }
        .nav-item { border: none; background: none; color: #9CA3AF; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; gap: 4px; }
        .home-circle { 
            background: #111827; color: white !important; width: 64px; height: 64px; 
            border-radius: 50%; margin-top: -50px; border: 4px solid var(--bg);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <header class="header">
        <strong id="app-logo" style="color: var(--zen-blue);">allergyZEN</strong>
        <div id="handshake-status" class="shield-timer-pill">
            <span style="width: 6px; height: 6px; background: var(--zen-blue); border-radius: 50%; animate: pulse 2s infinite;"></span>
            <span id="shield-countdown">3:00:00</span>
        </div>
    </header>

    <div class="content-scroll">
        <div id="reader-container">
            <div id="qr-reader"></div>
            <button id="close-scanner">✕</button>
        </div>

        <div class="top-carousel">
            <div class="scroll-card" style="background: linear-gradient(135deg, #1e3a8a, #3b82f6);">
                <div style="font-size: 10px; text-transform: uppercase; font-weight: 900; opacity: 0.8;">Active Shield</div>
                <h3 style="margin: 5px 0;">3-Hour Handshake</h3>
                <p style="font-size: 12px; opacity: 0.9;">Your data is shared with the kitchen until 14:30. Then, it wipes.</p>
            </div>
            <div class="scroll-card" style="background: var(--zen-brown);">
                <h3 style="margin: 5px 0;">Zen Update</h3>
                <p style="font-size: 12px; opacity: 0.9;">Brown Tier added: Track dislikes and mild intolerances.</p>
            </div>
        </div>

        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search ingredients or scan...">
            <span id="scan-trigger-icon" style="margin-left:15px; cursor: pointer; font-size: 20px;">📷</span>
        </div>

        <div style="background: white; padding: 24px; border-radius: 24px; margin-bottom: 20px; border: 1px solid #f3f4f6;">
            <h2 id="user-greeting" style="margin:0; font-weight: 900; letter-spacing: -1px;">Hey Me,</h2>
            <p style="color: #6B7280; font-size: 14px; margin-top: 5px;">You are currently in <strong>Safe Tab</strong> mode. Tap a tier below for info.</p>
        </div>

        <div style="background: white; padding: 20px; border-radius: 24px; border: 1px solid #f3f4f6;">
            <h3 style="font-size: 12px; text-transform: uppercase; font-weight: 900; color: #9CA3AF; margin-bottom: 15px;">Live Zen Spectrum</h3>
            <div class="spectrum-grid">
                <button class="spec-btn btn-red">RED</button>
                <button class="spec-btn btn-amber">AMB</button>
                <button class="spec-btn btn-brown">BRN</button>
                <button class="spec-btn btn-blue">BLUE</button>
                <button class="spec-btn btn-green">GRN</button>
            </div>
            <div style="margin-top: 15px; text-align: center;">
                <button id="see-safe-alt" style="background: none; border: none; color: var(--zen-blue); font-weight: 800; font-size: 12px; text-decoration: underline;">
                    See Safe Alternatives (SAFE TAB)
                </button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item">🔍<span>Lens</span></button>
        <button id="nav-safe" class="nav-item">🛡️<span>Safe</span></button>
        <button class="nav-item home-circle"><span style="font-size: 24px;">🏠</span></button>
        <button class="nav-item">🧬<span>ED</span></button>
        <button class="nav-item">•••<span>More</span></button>
    </nav>

</body>
</html>
