<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3B82F6"> <title>allergyZEN - Your Shield</title>
  <link rel="icon" href="/images/allergyzen-logo.png">
  <style>
    :root {
      --primary-blue: #3B82F6;
      --zen-red: #EF4444;
      --zen-amber: #F97316;
      --zen-brown: #78350f; /* Brown for Dislike/Reactivity */
      --zen-green: #22C55E;
      --background: #000000; /* High contrast black for 2026 Dark Mode */
      --card: #111827;
      --text: #F9FAFB;
      --text-muted: #9CA3AF;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--background);
      color: var(--text);
      overflow-x: hidden;
    }

    /* The Pulsing Blue Shield */
    .shield-container {
      height: 40vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: radial-gradient(circle at center, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
    }

    .blue-dot {
      width: 120px;
      height: 120px;
      background: var(--primary-blue);
      border-radius: 50%;
      box-shadow: 0 0 50px var(--primary-blue);
      animation: pulse-shield 2s infinite ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    @keyframes pulse-shield {
      0% { transform: scale(1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
      50% { transform: scale(1.1); box-shadow: 0 0 60px rgba(59, 130, 246, 0.9); }
      100% { transform: scale(1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
    }

    /* Handshake Timer */
    .timer-overlay {
      margin-top: 20px;
      text-align: center;
    }

    .timer-text {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .timer-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--primary-blue);
      font-weight: 800;
    }

    /* Grid Layout for Triggers */
    .zen-spectrum-grid {
      display: grid;
      grid-cols-2;
      gap: 12px;
      padding: 20px;
    }

    .trigger-card {
      background: var(--card);
      border-radius: 20px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .dot-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
    }

    /* Knowledge Hub Section */
    .hub-section {
      padding: 20px;
      background: #0a0a0a;
      border-top: 1px solid #1f2937;
    }

    .hub-title {
      font-size: 0.9rem;
      font-weight: 900;
      color: var(--text-muted);
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    .tip-card {
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .action-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      padding: 15px;
      display: flex;
      gap: 10px;
    }

    .btn-action {
      flex: 1;
      padding: 15px;
      border-radius: 15px;
      border: none;
      font-weight: 900;
      text-transform: uppercase;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <div class="shield-container">
    <div class="blue-dot">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="white">
        <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/>
      </svg>
    </div>
    <div class="timer-overlay">
      <div class="timer-text" id="countdown">02:59:59</div>
      <div class="timer-label">Handshake Active</div>
    </div>
  </div>

  <div class="hub-section">
    <h2 class="hub-title">The Zen Spectrum</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <div class="trigger-card" style="border-left: 4px solid var(--zen-red);">
        <span class="dot-indicator" style="background: var(--zen-red);"></span>
        <span style="font-size: 0.8rem; font-weight: 700;">Anaphylaxis (RED)</span>
      </div>
      <div class="trigger-card" style="border-left: 4px solid var(--zen-brown);">
        <span class="dot-indicator" style="background: var(--zen-brown);"></span>
        <span style="font-size: 0.8rem; font-weight: 700;">Dislike (BROWN)</span>
      </div>
    </div>
  </div>

  <div class="hub-section" id="knowledge-hub">
    <h2 class="hub-title">Knowledge Hub Tips</h2>
    <div class="tip-card">
      <span style="font-size: 1.5rem;">💡</span>
      <p style="font-size: 0.85rem;">Hidden cross-contamination: Ask if the grill is shared with dairy/soy.</p>
    </div>
    <div class="tip-card">
      <span style="font-size: 1.5rem;">💙</span>
      <p style="font-size: 0.85rem;">Neutral Environment: The blue dot tells the kitchen to skip the garnish.</p>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn-action" style="background: #333; color: white;" onclick="location.href='profile.html'">Edit Shield</button>
    <button class="btn-action" style="background: var(--primary-blue); color: white;" onclick="location.href='index.html'">Scan Menu</button>
  </div>

  <script>
    // 3-Hour Countdown Logic
    let timeLeft = 3 * 60 * 60; // Start with 3 hours
    
    // Load preference from localStorage (set in edit-profile.tsx)
    const savedDuration = localStorage.getItem("zen_handshake_duration");
    if (savedDuration === "30m") timeLeft = 30 * 60;
    if (savedDuration === "1h") timeLeft = 60 * 60;
    if (savedDuration === "24h") timeLeft = 24 * 60 * 60;

    const timerDisplay = document.getElementById('countdown');

    function updateTimer() {
      const hours = Math.floor(timeLeft / 3600);
      const mins = Math.floor((timeLeft % 3600) / 60);
      const secs = timeLeft % 60;
      
      timerDisplay.innerHTML = 
        `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      
      if (timeLeft > 0) {
        timeLeft--;
      } else {
        timerDisplay.innerHTML = "EXPIRED";
        timerDisplay.style.color = "var(--zen-red)";
        document.querySelector('.blue-dot').style.background = "#333";
        document.querySelector('.blue-dot').style.animation = "none";
      }
    }

    setInterval(updateTimer, 1000);
    updateTimer();
  </script>
</body>
</html>
