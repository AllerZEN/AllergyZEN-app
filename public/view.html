<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#673AB7">
  <title>allergyZEN | Active Shield</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary: #673AB7;
      --zen-blue: #3b82f6;
      --high-red: #EF4444;
      --amber: #F59E0B;
      --dislike-brown: #78350f;
      --safe-green: #22C55E;
    }
    .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .dot-red { background: var(--high-red); }
    .dot-amber { background: var(--amber); }
    .dot-brown { background: var(--dislike-brown); }
    .dot-green { background: var(--safe-green); }
    .dot-blue { background: var(--zen-blue); animation: pulse-blue 2s infinite ease-in-out; }

    @keyframes pulse-shield {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59,130,246,0.7); }
      70% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(59,130,246,0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59,130,246,0); }
    }
    .active-shield { animation: pulse-shield 2s infinite ease-in-out; }

    @keyframes pulse-blue {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.7); }
      50% { box-shadow: 0 0 8px 4px rgba(59,130,246,0.3); }
    }

    /* Knowledge Hub Modal */
    .hub-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: none; align-items: flex-end; justify-content: center; z-index: 200;
    }
    .hub-overlay.open { display: flex; }
    .hub-card {
      background: white; border-radius: 24px 24px 0 0; width: 100%; max-width: 500px;
      max-height: 80vh; overflow-y: auto; padding: 24px;
    }
    .hub-tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px;
      font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    .hub-tag-red { background: #FEE2E2; color: #991B1B; }
    .hub-tag-amber { background: #FEF3C7; color: #92400E; }
    .hub-tag-brown { background: #F5F0EB; color: #78350F; }
    .hub-tag-blue { background: #DBEAFE; color: #1E40AF; }

    /* Tracker Sync Toast */
    .sync-toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #1E293B; color: white; padding: 12px 24px; border-radius: 50px;
      font-size: 13px; font-weight: 700; display: none; z-index: 300;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .sync-toast.show { display: block; animation: toast-in 0.3s ease; }
    @keyframes toast-in { from { opacity:0; transform: translateX(-50%) translateY(20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

  <!-- Header with Handshake Duration -->
  <header class="bg-white border-b border-slate-100 p-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <button onclick="window.location.href='/index.html'" class="text-slate-400 p-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h1 class="text-lg font-black uppercase tracking-tighter">My Shield</h1>
    </div>
    <select id="duration-select" onchange="updateHandshakeDuration(this.value)" class="bg-slate-100 border-none rounded-xl text-[10px] font-black uppercase p-2 focus:ring-2 ring-purple-500">
      <option value="30">30 Min</option>
      <option value="60">1 Hr</option>
      <option value="180" selected>3 Hr</option>
      <option value="1440">24 Hr</option>
    </select>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-5 pb-28">

    <!-- Shield Status Card -->
    <div id="shield-card" class="bg-slate-200 text-slate-400 rounded-[2rem] p-8 text-center transition-all duration-500 relative overflow-hidden">
      <div class="text-5xl mb-3 relative z-10">&#x1F6E1;&#xFE0F;</div>
      <h2 id="shield-status" class="text-xl font-black uppercase tracking-tight relative z-10">Shield Inactive</h2>
      <p id="shield-timer" class="text-[11px] font-bold opacity-70 uppercase tracking-widest mt-1 relative z-10">Activate via Profile</p>
      <div id="shield-progress" class="absolute bottom-0 left-0 h-1.5 bg-white/30 transition-all duration-1000" style="width:0%"></div>
    </div>

    <!-- Spectrum Legend -->
    <div class="flex items-center justify-center gap-4 text-[10px] font-black uppercase tracking-wide text-slate-400">
      <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-red-500 inline-block"></span> High</span>
      <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-amber-400 inline-block"></span> Moderate</span>
      <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full inline-block" style="background:#78350f"></span> Dislike</span>
      <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span> Safe</span>
      <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-blue-500 inline-block" style="box-shadow:0 0 6px rgba(59,130,246,0.5)"></span> ED</span>
    </div>

    <!-- Active Spectrum List -->
    <div class="bg-white rounded-[2rem] p-6 shadow-lg shadow-slate-200/50 border border-slate-100">
      <div class="flex justify-between items-center mb-5">
        <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Active Spectrum</h3>
        <button onclick="window.location.href='/profile.html'" class="text-[10px] font-black uppercase text-purple-600">Edit Triggers</button>
      </div>
      <div class="space-y-2.5" id="items-list"></div>
    </div>

    <!-- Safe Alternatives Box -->
    <div id="safe-swap-box" class="hidden bg-green-50 rounded-[2rem] p-5 border-2 border-green-100">
      <h4 class="text-green-700 font-black uppercase text-[10px] mb-2 tracking-widest">Safe Zen Alternatives</h4>
      <div id="swap-content" class="text-sm font-bold text-green-900"></div>
    </div>

  </main>

  <!-- Knowledge Hub Modal -->
  <div id="hub-overlay" class="hub-overlay" onclick="if(event.target===this)closeHub()">
    <div class="hub-card" id="hub-card"></div>
  </div>

  <!-- Tracker Sync Toast -->
  <div id="sync-toast" class="sync-toast"></div>

  <script>
    /* =============================================
       PROFILE & HANDSHAKE (localStorage)
       ============================================= */
    function getProfile() {
      try { return JSON.parse(localStorage.getItem('allergyZEN_Profile')) || null; }
      catch(e) { return null; }
    }
    function saveProfile(p) { localStorage.setItem('allergyZEN_Profile', JSON.stringify(p)); }

    function getProtectionStatus() {
      var p = getProfile();
      if (!p || !p.isActive || !p.startTime) return 'INACTIVE';
      if (!p.sessionActive && !p.isActive) return 'INACTIVE';
      var elapsed = (Date.now() - p.startTime) / 60000;
      var dur = p.handshakeDuration || 180;
      if (elapsed < dur) return 'PROTECTED';
      return 'EXPIRED';
    }

    function getRemainingMinutes() {
      var p = getProfile();
      if (!p || !p.startTime) return 0;
      var dur = p.handshakeDuration || 180;
      return Math.max(0, Math.round(dur - (Date.now() - p.startTime) / 60000));
    }

    function updateUI() {
      var status = getProtectionStatus();
      var p = getProfile();
      var card = document.getElementById('shield-card');
      var text = document.getElementById('shield-status');
      var timer = document.getElementById('shield-timer');
      var prog = document.getElementById('shield-progress');

      if (status === 'PROTECTED') {
        card.className = 'bg-blue-600 text-white active-shield rounded-[2rem] p-8 text-center transition-all duration-500 relative overflow-hidden';
        text.textContent = 'Shield Active';
        var rem = getRemainingMinutes();
        var dur = p.handshakeDuration || 180;
        timer.textContent = rem + 'm Remaining';
        prog.style.width = ((rem / dur) * 100) + '%';
      } else {
        card.className = 'bg-slate-200 text-slate-400 rounded-[2rem] p-8 text-center transition-all duration-500 relative overflow-hidden';
        text.textContent = 'Shield Inactive';
        timer.textContent = 'Activate via Profile';
        prog.style.width = '0%';
        if (status === 'EXPIRED' && p) {
          p.isActive = false; p.sessionActive = false; p.startTime = null;
          saveProfile(p);
          document.getElementById('items-list').innerHTML = '<p class="text-center font-bold text-slate-300 py-4">Session Expired. Data Wiped for Privacy.</p>';
        }
      }
    }

    window.updateHandshakeDuration = function(mins) {
      var p = getProfile();
      if (p) { p.handshakeDuration = parseInt(mins); saveProfile(p); updateUI(); }
    };

    /* =============================================
       ZEN SPECTRUM TIER CLASSIFICATION
       ============================================= */
    var TIER_MAP = {
      red: ['Peanuts','Tree Nuts','Shellfish','Fish','Egg','SDS (Sodium Dodecyl Sulfate)','SDS','Hydroquinone','Formaldehyde','Latex','DMSO (Dimethyl Sulfoxide)','DMSO','Metol','Glacial Acetic Acid','Ammonium Thiosulfate','Nitrile Accelerators','EDTA'],
      amber: ['Dairy','Wheat','Soy','Croscarmellose Sodium','Magnesium Stearate','Lactose Monohydrate','Titanium Dioxide','Microcrystalline Cellulose','Gelatin (Bovine)','Gelatin (Porcine)','Natto (Bacillus subtilis)','Natto','Kimchi (Lactobacillus)','Kimchi','Kombucha','Aged Cheese','Sauerkraut','Miso','Pinene (Pine/Conifer)','Pinene','Myrcene (Hops/Mango)','Limonene (Citrus)','Limonene','Linalool (Lavender)','Caryophyllene (Pepper)','Eucalyptol'],
      brown: ['Wenge','Wenge Wood','Padauk','Cocobolo','Ebony','Rosewood','Mahogany','Teak','Mushroom Leather','Mushroom Leather (Mycelium)','PLA','PLA (Polylactic Acid)','Bamboo Rayon','Hemp Composite','Recycled PET','Vicuna','Qiviut (Muskox)','Cashmere','Angora','Mohair','Alpaca']
    };

    function getTier(name) {
      if (TIER_MAP.red.some(function(k){ return name.indexOf(k) >= 0; })) return 'red';
      if (TIER_MAP.amber.some(function(k){ return name.indexOf(k) >= 0; })) return 'amber';
      if (TIER_MAP.brown.some(function(k){ return name.indexOf(k) >= 0; })) return 'brown';
      return 'blue';
    }

    /* =============================================
       KNOWLEDGE HUB DATA
       ============================================= */
    var KNOWLEDGE = {
      'Croscarmellose Sodium': { cat: 'Medicinal Excipient', tag: 'amber', symptoms: 'Bloating, GI upset, delayed tablet dissolution reactions', hidden: 'E468, Modified Cellulose, Ac-Di-Sol', cross: 'Tablets, capsules, vitamin supplements', tip: 'Request liquid or gelatin-based alternatives from your pharmacist.' },
      'SDS': { cat: 'Lab Chemical', tag: 'red', symptoms: 'Skin irritation, contact dermatitis, eye damage', hidden: 'Sodium Dodecyl Sulfate, Sodium Lauryl Sulfate, SLS, E487', cross: 'Shampoos, lab reagents, toothpaste, cleaning products', tip: 'Use SLS-free personal care. In lab work, use nitrile gloves and fume hoods.' },
      'SDS (Sodium Dodecyl Sulfate)': { cat: 'Lab Chemical', tag: 'red', symptoms: 'Skin irritation, contact dermatitis, eye damage', hidden: 'SLS, Sodium Lauryl Sulfate, E487', cross: 'Shampoos, lab reagents, toothpaste', tip: 'Switch to SLS-free products.' },
      'Hydroquinone': { cat: 'Photographic Chemical', tag: 'red', symptoms: 'Skin depigmentation, respiratory sensitization', hidden: 'HQ, 1,4-Benzenediol, Quinol', cross: 'Photo developer, skin lightening creams', tip: 'Handle with full PPE. Avoid cosmetics containing HQ.' },
      'Wenge': { cat: 'Exotic Wood', tag: 'brown', symptoms: 'Respiratory sensitization, contact dermatitis, eye irritation', hidden: 'Millettia laurentii', cross: 'Furniture, flooring, musical instruments, workshop dust', tip: 'Use dust extraction and P2/N95 mask when working. Seal finished wood to lock in dust.' },
      'Wenge Wood': { cat: 'Exotic Wood', tag: 'brown', symptoms: 'Respiratory sensitization, contact dermatitis', hidden: 'Millettia laurentii', cross: 'Furniture, flooring, workshop dust', tip: 'Alternatives: Oak, Maple, Bamboo.' },
      'Vicuna': { cat: 'Luxury Fiber', tag: 'brown', symptoms: 'Contact sensitivity, itching, textile dermatitis', hidden: 'Vicugna fiber, South American camelid wool', cross: 'High-end scarves, coats, blankets', tip: 'Switch to organic cotton or Tencel for hypoallergenic luxury.' },
      'PLA': { cat: 'Modern Material', tag: 'brown', symptoms: 'Off-gassing sensitivity, skin contact reaction (rare)', hidden: 'Polylactic Acid, cornstarch plastic, bioplastic', cross: '3D printing filament, food packaging, disposable cups', tip: 'Use glass or stainless steel alternatives.' },
      'PLA (Polylactic Acid)': { cat: 'Modern Material', tag: 'brown', symptoms: 'Off-gassing sensitivity, skin contact reaction', hidden: 'Polylactic Acid, bioplastic', cross: '3D printing, packaging', tip: 'Use glass or steel.' },
      'Mushroom Leather': { cat: 'Modern Material', tag: 'brown', symptoms: 'Contact dermatitis, mold cross-reactivity', hidden: 'Mycelium leather, Mylo, Reishi-based textile', cross: 'Handbags, shoes, fashion accessories', tip: 'Patch test before wearing. Avoid if mold-sensitive.' },
      'Mushroom Leather (Mycelium)': { cat: 'Modern Material', tag: 'brown', symptoms: 'Contact dermatitis, mold cross-reactivity', hidden: 'Mylo, Reishi-based textile', cross: 'Fashion accessories', tip: 'Patch test first.' },
      'Pinene': { cat: 'Terpene', tag: 'amber', symptoms: 'Respiratory irritation, headache, bronchospasm in sensitized individuals', hidden: 'Alpha-Pinene, Beta-Pinene, turpentine component', cross: 'Pine cleaning products, conifer environments, essential oils', tip: 'Avoid pine-scented products. Use low-terpene alternatives.' },
      'Pinene (Pine/Conifer)': { cat: 'Terpene', tag: 'amber', symptoms: 'Respiratory irritation, headache', hidden: 'Alpha-Pinene, turpentine', cross: 'Pine cleaners, essential oils', tip: 'Avoid pine-scented products.' },
      'Peanuts': { cat: 'Food', tag: 'red', symptoms: 'Anaphylaxis, hives, throat swelling, GI distress', hidden: 'Arachis hypogaea, groundnut, monkey nut, earth nut', cross: 'Baked goods, sauces, Asian cuisine, ice cream', tip: 'Always carry epinephrine. Read EVERY label. Ask restaurants about oil type.' },
      'Dairy': { cat: 'Food', tag: 'amber', symptoms: 'Bloating, cramping, hives, eczema flare', hidden: 'Casein, Whey, Lactose, Lactalbumin, Ghee', cross: 'Bread, processed meats, medications, cosmetics', tip: 'Try oat milk, coconut milk, or almond milk alternatives.' },
      'Wheat': { cat: 'Food', tag: 'amber', symptoms: 'Bloating, brain fog, skin rash, fatigue', hidden: 'Gluten, Semolina, Durum, Spelt, Kamut, Couscous', cross: 'Soy sauce, beer, processed foods, communion wafers', tip: 'Use rice flour, almond flour, or buckwheat (not related to wheat).' },
      'Natto (Bacillus subtilis)': { cat: 'Fermented', tag: 'amber', symptoms: 'Histamine reaction, headache, flushing', hidden: 'Bacillus subtilis var. natto, nattokinase', cross: 'Japanese cuisine, supplements (nattokinase)', tip: 'Try tempeh (uses Rhizopus, not Bacillus) as an alternative.' },
      'DMSO': { cat: 'Lab Chemical', tag: 'red', symptoms: 'Garlic taste, skin absorption of contaminants, headache', hidden: 'Dimethyl Sulfoxide, methylsulfinylmethane', cross: 'Lab solvent, topical pain relief, veterinary medicine', tip: 'Use full gloves (not latex). DMSO penetrates most glove materials.' },
      'DMSO (Dimethyl Sulfoxide)': { cat: 'Lab Chemical', tag: 'red', symptoms: 'Garlic taste, rapid skin absorption', hidden: 'Dimethyl Sulfoxide', cross: 'Lab solvent, pain relief', tip: 'Use butyl rubber gloves.' },
      'Formaldehyde': { cat: 'Lab/Industrial', tag: 'red', symptoms: 'Respiratory irritation, carcinogen, skin sensitization', hidden: 'Formalin, Methylene Glycol, DMDM Hydantoin, Quaternium-15', cross: 'Hair straighteners, pressed wood, embalming, nail polish', tip: 'Check cosmetics for formaldehyde-releasing preservatives.' },
      'Latex': { cat: 'Lab/Medical', tag: 'red', symptoms: 'Anaphylaxis, contact urticaria, respiratory distress', hidden: 'Natural rubber latex, Hevea brasiliensis', cross: 'Gloves, balloons, elastic bands, condoms, medical devices', tip: 'Use nitrile alternatives. Cross-reactivity with banana, avocado, kiwi.' },
      'Limonene': { cat: 'Terpene', tag: 'amber', symptoms: 'Contact dermatitis, respiratory irritation', hidden: 'D-Limonene, citrus oil extract', cross: 'Cleaning products, citrus foods, essential oils, cosmetics', tip: 'Avoid citrus-scented cleaners. Check cosmetic ingredient lists.' },
      'Limonene (Citrus)': { cat: 'Terpene', tag: 'amber', symptoms: 'Contact dermatitis, respiratory irritation', hidden: 'D-Limonene', cross: 'Cleaners, cosmetics', tip: 'Avoid citrus-scented products.' }
    };

    /* =============================================
       RENDER SPECTRUM ITEMS
       ============================================= */
    function renderItems() {
      var list = document.getElementById('items-list');
      var p = getProfile();
      var risks = p ? (p.selectedRisks || p.risks || []) : [];

      if (!risks.length) {
        list.innerHTML = '<p class="text-center font-bold text-slate-300 py-4">No triggers set. Visit Profile to configure.</p>';
        return;
      }

      var html = '';
      risks.forEach(function(risk) {
        var tier = getTier(risk);
        var hasHub = !!KNOWLEDGE[risk];
        html += '<div class="flex items-center justify-between p-3.5 bg-slate-50 rounded-2xl border border-slate-100">' +
          '<div class="flex items-center gap-3 flex-1 min-w-0">' +
            '<div class="dot dot-' + tier + '"></div>' +
            '<span class="text-[11px] font-black uppercase text-slate-700 truncate">' + risk + '</span>' +
          '</div>' +
          '<div class="flex items-center gap-1.5 flex-shrink-0">' +
            (hasHub ? '<button onclick="openHub(\'' + risk.replace(/'/g, "\\'") + '\')" class="bg-purple-50 p-1.5 rounded-lg border border-purple-100"><span class="text-[8px] font-black text-purple-600 uppercase">Hub</span></button>' : '') +
            '<button onclick="showAlternatives(\'' + risk.replace(/'/g, "\\'") + '\')" class="bg-white p-1.5 rounded-lg shadow-sm border border-slate-100"><span class="text-[8px] font-black text-blue-600 uppercase">Swaps</span></button>' +
            '<button onclick="syncToTracker(\'' + risk.replace(/'/g, "\\'") + '\',\'' + tier + '\')" class="bg-slate-100 p-1.5 rounded-lg border border-slate-200"><span class="text-[8px] font-black text-slate-500 uppercase">Sync</span></button>' +
          '</div>' +
        '</div>';
      });
      list.innerHTML = html;
    }

    /* =============================================
       SAFE ALTERNATIVES
       ============================================= */
    function showAlternatives(name) {
      var box = document.getElementById('safe-swap-box');
      var content = document.getElementById('swap-content');
      var swaps = {
        'Croscarmellose Sodium': 'Gelatin capsules, Liquid medications, Compounded formulas',
        'SDS': 'SLS-free shampoo, Castile soap, Natural cleansers',
        'SDS (Sodium Dodecyl Sulfate)': 'SLS-free shampoo, Castile soap',
        'Hydroquinone': 'Vitamin C serum, Niacinamide, Arbutin',
        'Wenge': 'Oak, Maple, Bamboo, Pine',
        'Wenge Wood': 'Oak, Maple, Bamboo',
        'Vicuna': 'Organic cotton, Tencel, Bamboo silk',
        'PLA': 'Glass containers, Stainless steel, Silicone',
        'PLA (Polylactic Acid)': 'Glass, Stainless steel',
        'Mushroom Leather': 'Cork leather, Pineapple leather (Pinatex)',
        'Mushroom Leather (Mycelium)': 'Cork leather, Pinatex',
        'Pinene': 'Low-terpene extracts, Non-pine cleaners',
        'Pinene (Pine/Conifer)': 'Low-terpene extracts',
        'Peanuts': 'Sunflower butter, Tahini, Wow Butter',
        'Dairy': 'Oat Milk, Coconut Milk, Almond Milk, Cashew Yogurt',
        'Wheat': 'Rice flour, Almond flour, Buckwheat, Cassava flour',
        'Natto (Bacillus subtilis)': 'Tempeh (different culture), Tofu',
        'DMSO': 'Topical NSAIDs, Arnica gel',
        'DMSO (Dimethyl Sulfoxide)': 'Topical NSAIDs',
        'Formaldehyde': 'Formaldehyde-free hair treatments, Phenoxyethanol preservatives',
        'Latex': 'Nitrile gloves, Polyisoprene, Vinyl',
        'Limonene': 'Fragrance-free cleaners, Enzyme-based cleaners',
        'Limonene (Citrus)': 'Fragrance-free cleaners'
      };
      var match = swaps[name];
      if (match) {
        content.innerHTML = 'Instead of <strong>' + name + '</strong>, try: <span class="underline">' + match + '</span>';
      } else {
        content.innerHTML = 'No specific swaps found for <strong>' + name + '</strong>. Consult the Knowledge Hub.';
      }
      box.classList.remove('hidden');
      box.scrollIntoView({ behavior: 'smooth' });
    }

    /* =============================================
       KNOWLEDGE HUB MODAL
       ============================================= */
    function openHub(name) {
      var data = KNOWLEDGE[name];
      if (!data) return;
      var card = document.getElementById('hub-card');
      card.innerHTML =
        '<div class="flex justify-between items-start mb-4">' +
          '<div>' +
            '<h2 class="text-lg font-black text-slate-900">' + name + '</h2>' +
            '<span class="hub-tag hub-tag-' + data.tag + '">' + data.cat + '</span>' +
          '</div>' +
          '<button onclick="closeHub()" class="text-slate-400 text-2xl leading-none">&times;</button>' +
        '</div>' +
        '<div class="space-y-4 text-sm">' +
          '<div><p class="text-[10px] font-black uppercase text-slate-400 mb-1">Medical Symptoms</p><p class="text-slate-700">' + data.symptoms + '</p></div>' +
          '<div><p class="text-[10px] font-black uppercase text-slate-400 mb-1">Hidden Names / E-Numbers</p><p class="text-slate-700">' + data.hidden + '</p></div>' +
          '<div><p class="text-[10px] font-black uppercase text-slate-400 mb-1">Cross-Contamination Sources</p><p class="text-slate-700">' + data.cross + '</p></div>' +
          '<div class="bg-purple-50 rounded-xl p-4 border border-purple-100"><p class="text-[10px] font-black uppercase text-purple-600 mb-1">Zen Tip</p><p class="text-purple-900 font-semibold">' + data.tip + '</p></div>' +
        '</div>';
      document.getElementById('hub-overlay').classList.add('open');
    }

    function closeHub() {
      document.getElementById('hub-overlay').classList.remove('open');
    }

    /* =============================================
       TRACKER SYNC (localStorage)
       ============================================= */
    function syncToTracker(name, tier) {
      var trackers = JSON.parse(localStorage.getItem('allergyZEN_Trackers') || '[]');
      var exists = trackers.some(function(t) { return t.name === name; });
      if (!exists) {
        trackers.push({ name: name, tier: tier, syncedAt: new Date().toISOString(), source: 'shield' });
        localStorage.setItem('allergyZEN_Trackers', JSON.stringify(trackers));
      }
      // Also sync to notes
      var notes = JSON.parse(localStorage.getItem('allergyZEN_Notes') || '[]');
      notes.push({ text: 'Synced trigger: ' + name + ' (' + tier + ')', date: new Date().toISOString(), auto: true });
      localStorage.setItem('allergyZEN_Notes', JSON.stringify(notes));

      // Show toast
      var toast = document.getElementById('sync-toast');
      toast.textContent = name + ' synced to Tracker + Notes';
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2000);
    }

    /* =============================================
       BOOT
       ============================================= */
    window.onload = function() {
      var p = getProfile();
      if (p && p.handshakeDuration) {
        document.getElementById('duration-select').value = p.handshakeDuration;
      }
      renderItems();
      updateUI();
    };
    setInterval(updateUI, 1000);
  </script>
</body>
</html>
