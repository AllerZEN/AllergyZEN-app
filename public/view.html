<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8E55A2">
  <title>allergyZEN | Profile & Shield</title>
  <link rel="icon" href="/images/allergyzen-logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary: #8E55A2;
      --zen-blue: #3b82f6;
      --high-red: #EF4444;
      --dislike-brown: #78350f;
      --safe-green: #22C55E;
    }
    .zen-gradient { background: linear-gradient(135deg, #8E55A2 0%, #3b82f6 100%); }
    .dot { width: 14px; height: 14px; border-radius: 50%; }
    .dot-red { background: var(--high-red); }
    .dot-brown { background: var(--dislike-brown); }
    .dot-green { background: var(--safe-green); }
    .dot-blue { background: var(--zen-blue); box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    
    @keyframes pulse-shield {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
      70% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(59, 130, 246, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }
    .active-shield { animation: pulse-shield 2s infinite ease-in-out; }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

  <header class="bg-white border-b border-slate-100 p-6 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-4">
        <button onclick="window.location.href='/index.html'" class="text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h1 class="text-xl font-black uppercase tracking-tighter">My Shield</h1>
    </div>
    <select id="duration-select" onchange="updateHandshakeDuration(this.value)" class="bg-slate-100 border-none rounded-xl text-[10px] font-black uppercase p-2 focus:ring-2 ring-blue-500">
        <option value="30">30 Min</option>
        <option value="60">1 Hr</option>
        <option value="180" selected>3 Hr</option>
        <option value="1440">24 Hr</option>
    </select>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-6 pb-24">
    
    <div id="shield-card" class="bg-slate-200 rounded-[2.5rem] p-10 text-center transition-all duration-500 relative overflow-hidden">
      <div id="shield-icon" class="text-6xl mb-4 relative z-10">🛡️</div>
      <h2 id="shield-status" class="text-2xl font-black uppercase tracking-tighter relative z-10">Shield Inactive</h2>
      <p id="shield-timer" class="text-xs font-bold opacity-70 uppercase tracking-widest mt-2 relative z-10"></p>
      <div id="shield-progress" class="absolute bottom-0 left-0 h-2 bg-white/30 transition-all duration-1000" style="width: 0%"></div>
    </div>

    <div class="bg-white rounded-[2.5rem] p-8 shadow-xl shadow-slate-200/50 border border-slate-100">
      <div class="flex justify-between items-center mb-6">
          <h3 class="text-xs font-black uppercase tracking-widest text-slate-400">Active Spectrum</h3>
          <button onclick="window.location.href='/profile.html'" class="text-[10px] font-black uppercase text-blue-600">Edit Triggers</button>
      </div>

      <div class="space-y-3" id="items-list">
        </div>
    </div>

    <div id="safe-swap-box" class="hidden bg-green-50 rounded-[2.5rem] p-6 border-2 border-green-100 animate-in fade-in slide-in-from-bottom-4">
        <h4 class="text-green-700 font-black uppercase text-[10px] mb-2 tracking-widest">Safe Zen Alternatives</h4>
        <div id="swap-content" class="text-sm font-bold text-green-900"></div>
    </div>

  </main>

  <script>
    // Profile loaded from localStorage (matching index.html and profile.html pattern)
    function getProfile() {
      try {
        const raw = localStorage.getItem('allergyZEN_Profile');
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    }

    function saveProfile(profile) {
      localStorage.setItem('allergyZEN_Profile', JSON.stringify(profile));
    }

    function getProtectionStatus() {
      const profile = getProfile();
      if (!profile || !profile.isActive || !profile.startTime) return 'INACTIVE';
      const elapsed = (Date.now() - profile.startTime) / 60000;
      if (elapsed < profile.handshakeDuration) return 'PROTECTED';
      return 'EXPIRED';
    }

    function getRemainingMinutes() {
      const profile = getProfile();
      if (!profile || !profile.startTime) return 0;
      const elapsed = (Date.now() - profile.startTime) / 60000;
      return Math.max(0, Math.round(profile.handshakeDuration - elapsed));
    }

    function updateUI() {
      const status = getProtectionStatus();
      const profile = getProfile();
      const card = document.getElementById('shield-card');
      const text = document.getElementById('shield-status');
      const timer = document.getElementById('shield-timer');
      const progress = document.getElementById('shield-progress');

      if (status === 'PROTECTED') {
        card.classList.add('bg-blue-600', 'text-white', 'active-shield');
        card.classList.remove('bg-slate-200', 'text-slate-400');
        text.textContent = 'Shield Active';

        const remaining = getRemainingMinutes();
        const total = profile.handshakeDuration;
        const percent = (remaining / total) * 100;

        timer.textContent = remaining + 'm Remaining';
        progress.style.width = percent + '%';
      } else {
        card.classList.remove('bg-blue-600', 'text-white', 'active-shield');
        card.classList.add('bg-slate-200', 'text-slate-400');
        text.textContent = 'Shield Inactive';
        timer.textContent = 'Activate via Profile';
        progress.style.width = '0%';
        if (status === 'EXPIRED') {
          // Bulletproof Wipe
          if (profile) {
            profile.isActive = false;
            profile.startTime = null;
            saveProfile(profile);
          }
          document.getElementById('items-list').innerHTML = '<p class="text-center font-bold text-slate-300 py-4">Session Expired. Data Wiped.</p>';
        }
      }
    }

    function showAlternatives(triggerName) {
      const box = document.getElementById('safe-swap-box');
      const content = document.getElementById('swap-content');
      const swaps = {
        'Croscarmellose Sodium': 'Gelatin capsules, Liquid medications',
        'SDS': 'SLS-free shampoo, Castile soap',
        'Wenge': 'Oak, Maple, Bamboo',
        'Vicuna': 'Organic cotton, Tencel',
        'PLA': 'Glass containers, Stainless steel',
        'Pinene': 'Low-terpene extracts',
        'Natto (Bacillus subtilis)': 'Tempeh (different culture), Tofu',
        'Peanuts': 'Sunflower butter, Tahini',
        'Dairy': 'Oat Milk, Coconut Milk, Almond Milk',
        'Wheat': 'Rice flour, Almond flour, Buckwheat',
      };
      const match = swaps[triggerName];
      if (match) {
        content.innerHTML = 'Instead of ' + triggerName + ', try: <span class="underline">' + match + '</span>';
      } else {
        content.innerHTML = 'No specific swaps found for ' + triggerName + '. Consult the Knowledge Hub.';
      }
      box.classList.remove('hidden');
    }

    function renderItems() {
      const list = document.getElementById('items-list');
      const profile = getProfile();
      if (!profile || !profile.risks) {
        list.innerHTML = '<p class="text-center font-bold text-slate-300 py-4">No triggers set. Visit Profile to configure.</p>';
        return;
      }

      // Map risks to color tiers based on category
      const redKeywords = ['Peanuts', 'Tree Nuts', 'Shellfish', 'SDS', 'Hydroquinone', 'Formaldehyde', 'Latex', 'DMSO'];
      const brownKeywords = ['Wenge', 'Padauk', 'Mushroom Leather', 'PLA'];
      // Everything else is blue (ED/Sensory boundary)

      let html = '';
      profile.risks.forEach(function(risk) {
        let tier = 'blue';
        if (redKeywords.some(function(k) { return risk.includes(k); })) tier = 'red';
        else if (brownKeywords.some(function(k) { return risk.includes(k); })) tier = 'brown';

        html += '<div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">' +
          '<div class="flex items-center gap-3">' +
            '<div class="dot dot-' + tier + '"></div>' +
            '<span class="text-xs font-black uppercase text-slate-700">' + risk + '</span>' +
          '</div>' +
          '<button onclick="showAlternatives(\'' + risk.replace(/'/g, "\\'") + '\')" class="bg-white p-2 rounded-lg shadow-sm border border-slate-100">' +
            '<span class="text-[9px] font-black text-blue-600 uppercase">Swaps</span>' +
          '</button>' +
        '</div>';
      });
      list.innerHTML = html;
    }

    window.updateHandshakeDuration = function(mins) {
      const profile = getProfile();
      if (profile) {
        profile.handshakeDuration = parseInt(mins);
        saveProfile(profile);
        updateUI();
      }
    };

    // Set saved duration in dropdown
    window.onload = function() {
      const profile = getProfile();
      if (profile && profile.handshakeDuration) {
        document.getElementById('duration-select').value = profile.handshakeDuration;
      }
      renderItems();
      updateUI();
    };

    setInterval(updateUI, 1000);
  </script>
</body>
</html>
