<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>allergyZEN | Business Partner Portal</title>
    <link rel="icon" href="/images/allergyzen-logo.png">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-blue {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .pulse-dot {
            width: 14px;
            height: 14px;
            background: #3b82f6;
            border-radius: 50%;
            animation: pulse-blue 2s infinite;
        }
        .zen-font { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] zen-font">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PartnerDashboard = () => {
            const [tickets, setTickets] = useState([]);
            const [handshakeOption, setHandshakeOption] = useState('3h');

            // Simulate incoming encrypted handshake
            useEffect(() => {
                const incomingData = {
                    id: "ZEN-" + Math.floor(1000 + Math.random() * 9000),
                    guestName: "Table 4",
                    highReactivity: ["Peanuts", "Walnuts", "Croscarmellose Sodium"], // Red tier
                    intolerances: ["Dairy", "Cilantro"], // Brown tier (🟤)
                    edSupport: {
                        active: true,
                        boundaries: ["Soft Textures", "Deconstructed"]
                    },
                    status: '🟢',
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                setTickets([incomingData]);
            }, []);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* TOP NAVIGATION */}
                    <header className="max-w-5xl mx-auto flex flex-wrap justify-between items-center mb-10 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 gap-4">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 p-2 rounded-xl">
                                <img src="/images/allergyzen-logo.png" className="h-8" alt="Logo" />
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-slate-900 uppercase tracking-tighter">Partner Dashboard</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Liability Protection Active</p>
                            </div>
                        </div>

                        <div className="flex items-center gap-3 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                            <span className="text-[10px] font-black text-slate-500 uppercase ml-2">Session Window:</span>
                            <select 
                                value={handshakeOption} 
                                onChange={(e) => setHandshakeOption(e.target.value)}
                                className="bg-white border-none rounded-xl text-xs font-black p-2 shadow-sm focus:ring-2 ring-blue-500 outline-none"
                            >
                                <option value="30m">30 MIN</option>
                                <option value="1h">1 HOUR</option>
                                <option value="3h">3 HOURS</option>
                                <option value="24h">24 HOURS</option>
                            </select>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto">
                        <div className="flex items-center justify-between mb-6 px-4">
                            <h2 className="text-sm font-black text-slate-500 uppercase tracking-[0.2em] flex items-center gap-3">
                                <div className="pulse-dot"></div>
                                Live Handshakes
                            </h2>
                            <span className="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-100">
                                {tickets.length} Active
                            </span>
                        </div>

                        {tickets.length === 0 ? (
                            <div className="text-center py-32 bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
                                <p className="text-slate-400 font-bold uppercase tracking-widest">Waiting for incoming scan...</p>
                            </div>
                        ) : (
                            <div className="grid gap-6">
                                {tickets.map(ticket => (
                                    <div key={ticket.id} className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100">
                                        {/* TICKET HEADER */}
                                        <div className="bg-slate-900 p-6 flex justify-between items-center text-white">
                                            <div className="flex items-center gap-4">
                                                <div className="text-3xl">{ticket.status}</div>
                                                <div>
                                                    <h3 className="text-xl font-black tracking-tighter uppercase">{ticket.guestName}</h3>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Handshake ID: {ticket.id}</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest">Privacy Wipe In</p>
                                                <p className="text-xl font-black tabular-nums text-orange-400">{handshakeOption}</p>
                                            </div>
                                        </div>

                                        <div className="p-8 grid md:grid-cols-2 gap-8">
                                            {/* HIGH REACTIVITY TIER (RED) */}
                                            <section>
                                                <h4 className="text-[10px] font-black text-red-500 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                                                    🔴 High Reactivity (Strict)
                                                </h4>
                                                <div className="flex flex-wrap gap-2">
                                                    {ticket.highReactivity.map(risk => (
                                                        <span key={risk} className="bg-red-50 text-red-700 px-4 py-2 rounded-xl font-black text-xs border-2 border-red-100 uppercase">
                                                            {risk}
                                                        </span>
                                                    ))}
                                                </div>
                                            </section>

                                            {/* DISLIKE TIER (BROWN) */}
                                            <section>
                                                <h4 className="text-[10px] font-black text-[#78350f] uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                                                    🟤 Dislikes / Intolerance
                                                </h4>
                                                <div className="flex flex-wrap gap-2">
                                                    {ticket.intolerances.map(item => (
                                                        <span key={item} className="bg-amber-50 text-[#78350f] px-4 py-2 rounded-xl font-black text-xs border-2 border-amber-100 uppercase">
                                                            {item}
                                                        </span>
                                                    ))}
                                                </div>
                                            </section>

                                            {/* BLUE DOT BOUNDARIES */}
                                            {ticket.edSupport.active && (
                                                <section className="md:col-span-2 bg-blue-50/50 p-6 rounded-[2rem] border-2 border-blue-100">
                                                    <h4 className="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                                                        💙 Blue Dot Boundaries
                                                    </h4>
                                                    <div className="flex flex-wrap gap-3">
                                                        {ticket.edSupport.boundaries.map(bound => (
                                                            <div key={bound} className="bg-white px-4 py-3 rounded-xl border border-blue-200 text-xs font-black text-blue-800 uppercase flex items-center gap-2">
                                                                <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                                                                {bound}
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <p className="mt-4 text-[11px] font-medium text-blue-600 leading-relaxed italic">
                                                        "Neutral language requested. Please prioritize sensory safety and minimal conversation regarding ingredients."
                                                    </p>
                                                </section>
                                            )}
                                        </div>

                                        <div className="px-8 pb-8 flex flex-wrap gap-4">
                                            <button className="flex-1 bg-green-600 text-white font-black py-4 rounded-2xl hover:bg-green-700 transition shadow-lg shadow-green-100 uppercase text-xs tracking-widest">
                                                Accept Ticket
                                            </button>
                                            <button className="flex-1 bg-slate-100 text-slate-500 font-black py-4 rounded-2xl hover:bg-slate-200 transition uppercase text-xs tracking-widest">
                                                Contact Guest
                                            </button>
                                        </div>

                                        <div className="bg-slate-50 p-4 border-t border-slate-100 text-center">
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">
                                                Liability Shield Active: No data persists after session expiry.
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PartnerDashboard />);
    </script>
</body>
</html>
