<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>allergyZEN | Business Dashboard</title>
    <link rel="icon" href="/images/allergyzen-logo.png">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-blue {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .pulse-dot {
            width: 20px;
            height: 20px;
            background: #3b82f6;
            border-radius: 50%;
            animation: pulse-blue 2s infinite;
        }
        .status-red { color: #ef4444; }
        .status-brown { color: #78350f; } /* Updated from yellow to brown */
        .status-green { color: #22c55e; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PartnerDashboard = () => {
            const [activeTickets, setActiveTickets] = useState([]);
            const [handshakeTime, setHandshakeTime] = useState('3h');

            // Logic to simulate receiving a "Trusted Kitchen Ticket"
            useEffect(() => {
                // This would normally be a real-time listener from your database
                const mockTicket = {
                    id: 'TK-' + Math.random().toString(36).substr(2, 4).toUpperCase(),
                    timestamp: new Date().toLocaleTimeString(),
                    risks: ['Peanuts', 'Shellfish'],
                    edSupport: true, // ED support active
                    status: '🟢'
                };
                setActiveTickets([mockTicket]);
            }, []);

            return (
                <div class="p-6 max-w-4xl mx-auto">
                    <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <div class="flex items-center gap-3">
                            <img src="/images/allergyzen-logo.png" class="h-10" alt="Logo" />
                            <h1 class="text-xl font-bold text-gray-800">allergyZEN Partner Portal</h1>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-medium text-gray-500">Handshake Window:</span>
                            <select 
                                value={handshakeTime} 
                                onChange={(e) => setHandshakeTime(e.target.value)}
                                class="border rounded p-1 text-sm bg-white"
                            >
                                <option value="30m">30 Min</option>
                                <option value="1h">1 Hour</option>
                                <option value="3h">3 Hours</option>
                                <option value="24h">24 Hours</option>
                            </select>
                        </div>
                    </header>

                    <main>
                        <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                            <div class="pulse-dot"></div>
                            Active Handshakes
                        </h2>

                        {activeTickets.length === 0 ? (
                            <div class="text-center py-20 bg-white rounded-2xl border-2 border-dashed border-gray-200">
                                <p class="text-gray-400">Waiting for guest to scan QR code...</p>
                            </div>
                        ) : (
                            <div class="grid gap-4">
                                {activeTickets.map(ticket => (
                                    <div key={ticket.id} class="bg-white p-6 rounded-2xl shadow-md border-l-8 border-blue-500">
                                        <div class="flex justify-between items-start">
                                            <div>
                                                <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">
                                                    {ticket.id}
                                                </span>
                                                <h3 class="text-2xl font-bold mt-2">Trusted Kitchen Ticket</h3>
                                                <p class="text-sm text-gray-500">Scanned at: {ticket.timestamp}</p>
                                            </div>
                                            <div class="text-3xl">{ticket.status}</div>
                                        </div>

                                        <div class="mt-6">
                                            <h4 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Risk Profile</h4>
                                            <div class="flex flex-wrap gap-2 mt-2">
                                                {ticket.risks.map(risk => (
                                                    <span key={risk} class="bg-red-50 text-red-700 px-4 py-2 rounded-lg font-bold border border-red-100">
                                                        🔴 {risk}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>

                                        {ticket.edSupport && (
                                            <div class="mt-4 p-3 bg-blue-50 rounded-lg border border-blue-100 flex items-center gap-2">
                                                <span class="text-blue-600 font-semibold">ED Support Active:</span>
                                                <span class="text-sm text-blue-800">Guest requests neutral language and minimal food-talk.</span>
                                            </div>
                                        )}

                                        <div class="mt-6 flex gap-3">
                                            <button class="flex-1 bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition">
                                                ACCEPT & PROTECT
                                            </button>
                                            <button class="px-6 py-3 border border-gray-200 rounded-xl text-gray-500 font-medium">
                                                VIEW SAFE ALTERNATIVES
                                            </button>
                                        </div>
                                        
                                        <p class="text-[10px] text-gray-400 mt-4 text-center">
                                            Strict Privacy: This ticket will automatically wipe in {handshakeTime}.
                                        </p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PartnerDashboard />);
    </script>
</body>
</html>
