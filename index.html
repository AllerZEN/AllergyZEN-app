<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8E55A2">
  <title>allergyZEN - Launchpad</title>
  <link rel="stylesheet" href="/style.css"> 
  <style>
    :root {
      --primary: #8E55A2;
      --primary-light: #A77BB8;
      --safe-green: #22C55E;
      --caution-amber: #F97316;
      --danger-red: #EF4444;
      --boundary-blue: #3B82F6;
      --background: #FAFAFA;
      --card: #FFFFFF;
      --text: #1F2937;
      --border: #E5E7EB;
    }
    body { font-family: sans-serif; background: var(--background); color: var(--text); padding-bottom: 80px; }
    .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px; text-align: center; }
    .logo { height: 40px; cursor: pointer; }
    .main { max-width: 480px; margin: 0 auto; padding: 16px; }
    .greeting { background: linear-gradient(135deg, var(--primary-light), var(--primary)); padding: 20px; border-radius: 16px; color: white; margin-bottom: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .timer-card { border: 2px solid var(--boundary-blue); background: #eff6ff; }
    .timer-display { font-size: 2rem; font-weight: 700; color: var(--boundary-blue); text-align: center; }
    .search-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); padding: 10px 0; display: flex; justify-content: space-around; }
    .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; color: #6B7280; text-decoration: none; border:none; background:none; }
    .nav-item.center { background: var(--primary); color: white; width: 56px; height: 56px; border-radius: 50%; margin-top: -25px; justify-content: center; box-shadow: 0 4px 12px rgba(142,85,162,0.3); }
    .hidden { display: none !important; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .dot-blue { background: var(--boundary-blue); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>

  <header class="header">
    <img src="/images/allergyzen-logo.png" alt="allergyZEN" class="logo">
  </header>

  <main class="main">
    <div class="greeting">
      <h1 id="greeting-name">Hey there,</h1>
      <p id="greeting-quote">Breathe. You're protected.</p>
    </div>

    <div id="timer-card" class="card timer-card hidden">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
        <span class="dot dot-blue"></span>
        <strong style="color:var(--boundary-blue)">Handshake Active</strong>
      </div>
      <div class="timer-display" id="timer-display">03:00:00</div>
      <p style="text-align:center; font-size:0.8rem; margin-top:8px;" id="business-info">Connected to Partner</p>
    </div>

    <div class="card">
      <h3>Your Active Shield</h3>
      <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; text-align:center; margin-top:15px;">
        <div><div class="dot" style="background:var(--danger-red)"></div><div id="red-count">0</div></div>
        <div><div class="dot" style="background:var(--caution-amber)"></div><div id="amber-count">0</div></div>
        <div><div class="dot" style="background:var(--safe-green)"></div><div id="green-count">0</div></div>
        <div><div class="dot" style="background:var(--boundary-blue)"></div><div id="blue-count">0</div></div>
      </div>
    </div>

    <div class="card">
      <h3>Quick Search</h3>
      <input type="text" id="search-input" class="search-input" placeholder="Search 1,750+ allergens...">
      <div id="search-results" style="margin-top:10px;"></div>
    </div>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item" onclick="location.href='/view.html'"><span>🔍</span><span>Scan</span></button>
    <button class="nav-item"><span>✅</span><span>Safe</span></button>
    <button class="nav-item center" onclick="location.href='/index.html'"><span>🏠</span></button>
    <button class="nav-item"><span>🚫</span><span>Blocked</span></button>
    <button class="nav-item" onclick="location.href='/view.html'"><span>⚙️</span><span>Profile</span></button>
  </nav>

  <script src="/js/profile.js"></script>
  <script>
    let allergenList = [];

    // Load the 1,750 items
    async function initSearch() {
      try {
        const response = await fetch('/data/allergens.json');
        allergenList = await response.json();
      } catch (e) {
        console.warn("Allergen database not loaded yet.");
      }
    }

    function updateUI() {
      const profile = userProfile.getActiveProfile();
      if (!profile) return;

      document.getElementById('greeting-name').textContent = `Hey ${profile.name},`;
      
      // Update counts
      document.getElementById('red-count').textContent = profile.items.red.length;
      document.getElementById('amber-count').textContent = profile.items.amber.length;
      document.getElementById('green-count').textContent = profile.items.green.length;
      document.getElementById('blue-count').textContent = profile.items.blue.length;
    }

    function updateTimerDisplay() {
      const remaining = userProfile.getProtectionTimeRemaining();
      const card = document.getElementById('timer-card');
      
      if (remaining > 0) {
        card.classList.remove('hidden');
        const h = Math.floor(remaining / 3600000);
        const m = Math.floor((remaining % 3600000) / 60000);
        const s = Math.floor((remaining % 60000) / 1000);
        document.getElementById('timer-display').textContent = 
          `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        document.getElementById('business-info').textContent = `Connected to ${userProfile.session.protectionWindow.businessName}`;
      } else {
        card.classList.add('hidden');
      }
    }

    // Search Logic
    document.getElementById('search-input').addEventListener('input', (e) => {
      const val = e.target.value.toLowerCase();
      const results = document.getElementById('search-results');
      if (val.length < 2) { results.innerHTML = ''; return; }

      const matches = allergenList.filter(i => i.name.toLowerCase().includes(val)).slice(0, 5);
      results.innerHTML = matches.map(m => `
        <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
          <span>${m.name} <small>(${m.category})</small></span>
          <button onclick="userProfile.addItem('${m.name}', '${m.category}', 'red'); updateUI();" style="color:var(--primary); background:none; border:none; cursor:pointer;">+ Add</button>
        </div>
      `).join('');
    });

    // Initialize
    window.onload = () => {
      userProfile.init();
      updateUI();
      initSearch();
      setInterval(updateTimerDisplay, 1000);
    };
  </script>
</body>
</html>
