<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#8E55A2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>allergyZEN | v0 Dashboard</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">

  <script>
    const APP_VERSION = '1.0.4'; 
    async function forceAppUpdate() {
      if ('caches' in window) {
        const names = await caches.keys();
        await Promise.all(names.map(name => caches.delete(name)));
      }
      localStorage.setItem('az_version', APP_VERSION);
      window.location.href = window.location.pathname + '?refresh=' + Date.now();
    }
    if (localStorage.getItem('az_version') !== APP_VERSION) { forceAppUpdate(); }
  </script>

  <style>
    :root {
      --primary: #8E55A2;
      --primary-light: #A77BB8;
      --safe: #22C55E;
      --danger: #EF4444;
      --caution: #F97316;
      --boundary: #3B82F6;
      --bg: #FAFAFA;
      --card: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
    body { background: var(--bg); color: #1F2937; padding-bottom: 90px; }

    /* v0 Header Style */
    .header-banner {
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
      color: white; padding: 40px 20px; border-radius: 0 0 30px 30px;
    }
    .header-banner h1 { font-size: 1.8rem; margin-bottom: 5px; }
    .header-banner p { opacity: 0.9; font-size: 0.9rem; }

    /* The Main Shield Card */
    .shield-container {
      margin: -30px 15px 15px 15px; background: var(--card);
      border-radius: 20px; padding: 25px; border: 1px solid #eee;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .shield-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    
    .blue-dot {
      width: 12px; height: 12px; background: var(--boundary); border-radius: 50%;
      display: inline-block; margin-right: 8px; animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
      100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }

    /* Quick-Add Search (Replaces score in v0) */
    .search-box {
      width: 100%; padding: 15px; border-radius: 30px; border: 2px solid #F3F4F6;
      background: #F9FAFB; font-size: 1rem; margin-bottom: 10px;
    }

    /* Tabs & Navigation */
    .tab-content { display: none; padding: 20px; }
    .tab-content.active { display: block; }
    
    .bottom-nav {
      position: fixed; bottom: 0; width: 100%; background: white;
      height: 80px; display: flex; justify-content: space-around;
      align-items: center; border-top: 1px solid #eee; z-index: 1000;
    }
    .nav-item { border: none; background: none; color: #9CA3AF; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; }
    .nav-item.active { color: var(--primary); font-weight: bold; }
    .nav-center {
      background: var(--primary); color: white; width: 60px; height: 60px;
      border-radius: 50%; margin-top: -40px; box-shadow: 0 5px 15px rgba(142,85,162,0.3);
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    }

    /* Result Sorting UI */
    .result-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; }
    .tag { font-size: 0.75rem; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; }
    .tag-red { background: #fee2e2; color: var(--danger); }
    .tag-amber { background: #ffedd5; color: var(--caution); }
    .tag-green { background: #dcfce7; color: var(--safe); }
  </style>
</head>
<body>

  <div id="tab-home" class="tab-content active">
    <div class="header-banner">
      <h1 id="user-greeting">Hey me,</h1>
      <p id="quote-display">Your health matters. You matter.</p>
    </div>

    <div class="shield-container">
      <div class="shield-header">
        <div>
          <span class="blue-dot"></span>
          <strong id="active-profile-label">Me's Shield</strong>
        </div>
        <span id="timer-display" style="color: var(--boundary); font-weight: bold;">03:00:00</span>
      </div>

      <input type="text" class="search-box" id="shield-search" 
             placeholder="Quick-add to Zen Spectrum..." onkeyup="processSearch(this.value)">
      
      <div id="results-area"></div>
      
      <div id="emergency-box" style="margin-top:20px; background:#FEF3C7; padding:15px; border-radius:15px; font-size:0.8rem; color:#92400E;">
        <strong>Emergency Relief Guide:</strong> Stay calm. Use antihistamines or EpiPen if prescribed. Contact emergency services if severe.
      </div>
    </div>
  </div>

  <div id="tab-scan" class="tab-content">
    <video id="scanner-view" style="width:100%; border-radius:20px; background:black;"></video>
  </div>
  <div id="tab-safe" class="tab-content"><h2>Your Safe List</h2><div id="safe-list-container"></div></div>
  <div id="tab-health" class="tab-content">
      <div class="shield-container" style="text-align:center;">
          <h1 style="font-size:3rem; color:var(--primary);" id="zen-score-val">85</h1>
          <p>Zen Score</p>
          <button onclick="syncSteps()" style="padding:10px 20px; background:var(--primary); color:white; border:none; border-radius:20px; margin-top:15px;">Sync Activity</button>
      </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('home')"><span>🏠</span>Home</button>
    <button class="nav-item" onclick="switchTab('safe')"><span>✅</span>Safe</button>
    <button class="nav-item nav-center" onclick="startScan()"><span>📷</span></button>
    <button class="nav-item" onclick="switchTab('health')"><span>📈</span>Health</button>
    <button class="nav-item" onclick="window.location.href='profile.html'"><span>⚙️</span>Profile</button>
  </nav>

  <script>
    // --- MASTER DATA ENGINE ---
    const allergyZEN = {
      profile: JSON.parse(localStorage.getItem('az_user')) || { name: 'Me', dislikes: [], allergens: [] },
      expiry: localStorage.getItem('az_expiry') || null,
      
      init() {
        document.getElementById('user-greeting').innerText = `Hey ${this.profile.name.toLowerCase()},`;
        document.getElementById('active-profile-label').innerText = `${this.profile.name}'s Shield`;
        this.runTimer();
        setInterval(() => this.runTimer(), 1000);
      },

      runTimer() {
        if (!this.expiry) return;
        const remaining = this.expiry - Date.now();
        if (remaining <= 0) {
          document.getElementById('timer-display').innerText = "EXPIRED";
          return;
        }
        const h = Math.floor(remaining / 3600000).toString().padStart(2, '0');
        const m = Math.floor((remaining % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((remaining % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
      }
    };

    // --- SEARCH & RED-FIRST SORTING ---
    function processSearch(query) {
      const area = document.getElementById('results-area');
      if (query.length < 2) { area.innerHTML = ''; return; }

      // Dummy DB for search logic
      const db = [
        { name: 'Peanut Oil', type: 'red' },
        { name: 'Wenge Wood Dust', type: 'amber' },
        { name: 'Lactose', type: 'amber' },
        { name: 'Pure Water', type: 'green' }
      ];

      const filtered = db.filter(i => i.name.toLowerCase().includes(query.toLowerCase()))
                         .sort((a, b) => {
                           const p = { 'red': 1, 'amber': 2, 'green': 3 };
                           return p[a.type] - p[b.type];
                         });

      area.innerHTML = filtered.map(item => `
        <div class="result-row">
          <span>${item.name}</span>
          <span class="tag tag-${item.type}">${item.type}</span>
        </div>
      `).join('');
    }

    // --- NAVIGATION LOGIC ---
    function switchTab(id) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');
    }

    async function startScan() {
      switchTab('scan');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        document.getElementById('scanner-view').srcObject = stream;
        document.getElementById('scanner-view').play();
        // Trigger 3-hour handshake
        const threeHours = Date.now() + (3 * 60 * 60 * 1000);
        localStorage.setItem('az_expiry', threeHours);
        allergyZEN.expiry = threeHours;
      } catch (e) { alert("Camera blocked. Please check phone settings."); }
    }

    function syncSteps() {
      alert("Syncing with health data... Please allow 'Motion & Fitness' in your phone settings.");
    }

    allergyZEN.init();
  </script>
</body>
</html>
