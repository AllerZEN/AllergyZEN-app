<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>allerZEN | App Setup</title>
    <style>
        :root { --primary: #8e44ad; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fdfbff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .logo { width: 120px; margin-bottom: 20px; }
        .container { width: 85%; max-width: 400px; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn { display: block; width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; font-size: 1.1rem; font-weight: bold; text-decoration: none; border: none; cursor: pointer; box-sizing: border-box; }
        .btn-install { background: var(--primary); color: white; }
        .btn-setup { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
        #guide { display: none; font-size: 0.9rem; color: #555; background: #f3e5f5; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px dashed var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <img src="https://allergyzen.app/logo.png" alt="allergyZEN" class="logo">
    
    <h2>Welcome to allerZEN</h2>
    <p>Setup your safety shield in two steps:</p>

    <button class="btn btn-install" onclick="showGuide()">1. ADD TO HOME SCREEN</button>
    <div id="guide">
        Tap the <strong>Share</strong> icon (iPhone) or <strong>⋮</strong> (Android) and select <strong>'Add to Home Screen'</strong> to install the full app.
    </div>

    <a href="profile.html" class="btn btn-setup">2. SETUP MY PROFILE</a>

    <p style="margin-top: 30px; font-size: 0.8rem; color: #999;">
        Business? <a href="partner.html" style="color:var(--primary);">Partner Portal</a>
    </p>
</div>

<script>
    function showGuide() {
        document.getElementById('guide').style.display = 'block';
    }
</script>

</body>
</html>
