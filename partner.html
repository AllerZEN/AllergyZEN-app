<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Partnership | allerZEN</title>
    <style>
        :root { --primary: #8e44ad; --dark: #2c3e50; --secondary: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fafafa; color: var(--dark); text-align: center; }
        .hero { background: white; padding: 40px 20px; border-bottom: 3px solid var(--primary); }
        .form-container { max-width: 500px; margin: 30px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: left; }
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--primary); }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .timer-info { font-size: 0.85rem; color: #666; margin-top: 5px; font-style: italic; }
        .btn-submit { width: 100%; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: bold; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>

<div class="hero">
    <img src="https://allergyzen.app/logo.png" style="width: 100px;">
    <h1>Join the allerZEN Network</h1>
    <p>Secure your premises and protect your customers.</p>
</div>

<div class="form-container">
    <form action="/partner-dashboard.html">
        <label>Business Name</label>
        <input type="text" placeholder="e.g. The Lotus Cafe" required>

        <label>Venue Type</label>
        <select id="venueType" onchange="updateTimerText()">
            <option value="1">Express (Cafe / Takeaway)</option>
            <option value="3" selected>Standard (Restaurant)</option>
            <option value="5">Event (Weddings / Conferences)</option>
        </select>
        <p id="timer-desc" class="timer-info">Customer scans will expire in 3 hours.</p>

        <label>Email Address</label>
        <input type="email" placeholder="owner@business.com" required>

        <button type="submit" class="btn-submit">Activate My Business QR</button>
    </form>
</div>

<script>
    function updateTimerText() {
        const hours = document.getElementById('venueType').value;
        document.getElementById('timer-desc').innerText = `Customer scans will expire in ${hours} hour(s).`;
    }
</script>

</body>
</html>
